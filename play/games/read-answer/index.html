<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800;900&family=DM+Sans:wght@400;500;600;700;800;900&family=Cairo:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    button { font-family: inherit; cursor: pointer; }
    a { text-decoration: none; color: inherit; }
    :root {
      --ink:#1c1917; --ink-deep:#0c0a09;
      --bg:#f5efe0; --paper:#fdfaf0; --paper-soft:#faf3e0; --paper-deep:#f0e6cd;
      --border:#e0d4b2; --border-soft:#ece2c5;
      --gold:#b45309; --gold-bright:#d97706; --gold-soft:#fef3c7;
      --text:#1c1917; --text-2:#44403c; --text-muted:#78716c;
      --green:#15803d; --red:#b91c1c;
      --display:'Outfit','DM Sans',system-ui,sans-serif; --sans:'DM Sans',sans-serif;
      --arabic:'Cairo','Tajawal',sans-serif; --mono:'JetBrains Mono',ui-monospace,monospace;
    }
    html, body { background: var(--bg); color: var(--text); font-family: var(--sans); font-size: 16px; min-height: 100%; -webkit-font-smoothing: antialiased; }
    body::before { content: ""; position: fixed; inset: 0; pointer-events: none; z-index: 0; background: radial-gradient(ellipse 60% 40% at 80% 0%, rgba(180, 83, 9, 0.08), transparent 60%); }

    .topbar { position: sticky; top: 0; z-index: 100; background: rgba(245, 239, 224, 0.85); backdrop-filter: blur(18px) saturate(180%); border-bottom: 1px solid var(--border-soft); padding: 14px 24px; display: flex; align-items: center; justify-content: space-between; gap: 14px; flex-wrap: wrap; }
    .back-link { display: inline-flex; align-items: center; gap: 10px; padding: 8px 14px; border-radius: 999px; background: var(--paper); border: 1px solid var(--border); font-family: var(--display); font-size: 13px; font-weight: 700; color: var(--text-2); transition: all 0.18s ease; }
    .back-link:hover { background: var(--ink); color: white; border-color: var(--ink); }
    .game-title { font-family: var(--display); font-weight: 900; font-size: 18px; letter-spacing: -0.02em; }
    .scoreboard { display: flex; gap: 12px; font-family: var(--display); font-size: 11px; font-weight: 700; color: var(--text-muted); letter-spacing: 0.08em; text-transform: uppercase; }
    .scoreboard b { color: var(--ink); font-family: var(--mono); font-size: 16px; font-weight: 800; margin-left: 4px; }

    .page { position: relative; z-index: 2; max-width: 820px; margin: 0 auto; padding: 32px 24px 60px; }

    .mascot-wrap { position: relative; display: inline-flex; }
    .mascot { filter: drop-shadow(0 6px 12px rgba(28, 25, 23, 0.25)); transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1); }
    .mascot.is-bounce { animation: bounce 0.5s ease; }
    @keyframes bounce { 50% { transform: translateY(-12px) rotate(-4deg); } }
    .mascot.is-shake { animation: shake-m 0.4s ease; }
    @keyframes shake-m { 25% { transform: translateX(-6px) rotate(-3deg); } 75% { transform: translateX(6px) rotate(3deg); } }

    .level-bar { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; margin-bottom: 22px; padding: 14px 18px; border-radius: 14px; background: var(--paper); border: 1px solid var(--border); }
    .level-bar-label { font-family: var(--display); font-size: 10px; font-weight: 800; color: var(--text-muted); letter-spacing: 0.18em; text-transform: uppercase; }
    .lev-btn { padding: 8px 14px; border-radius: 10px; background: transparent; border: 1.5px solid var(--border); font-family: var(--display); font-size: 12px; font-weight: 700; color: var(--text-2); transition: all 0.18s ease; }
    .lev-btn:hover { border-color: var(--gold); }
    .lev-btn.is-active { background: var(--ink); color: white; border-color: var(--ink); }

    /* Passage card */
    .passage-card {
      padding: 36px 34px; border-radius: 22px;
      background: radial-gradient(ellipse 70% 50% at 100% 0%, rgba(217, 119, 6, 0.08), transparent 60%), linear-gradient(160deg, var(--paper), var(--paper-soft));
      border: 1px solid var(--border); margin-bottom: 22px;
      position: relative;
      box-shadow: 0 12px 28px -12px rgba(115, 99, 53, 0.18);
    }
    .passage-card::before { content: ""; position: absolute; top: 0; left: 0; right: 0; height: 4px; background: linear-gradient(90deg, var(--ink), var(--gold), var(--gold-bright)); border-radius: 22px 22px 0 0; }
    .passage-header { display: flex; align-items: center; gap: 18px; margin-bottom: 18px; }
    .passage-emoji { font-size: 36px; }
    .passage-meta { flex: 1; }
    .passage-title { font-family: var(--display); font-size: 20px; font-weight: 900; letter-spacing: -0.015em; color: var(--text); }
    .passage-info { font-family: var(--display); font-size: 11px; color: var(--text-muted); font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; margin-top: 4px; }
    .passage-text {
      font-family: var(--display); font-size: clamp(15px, 1.9vw, 17px); line-height: 1.8;
      color: var(--text-2); font-weight: 500;
    }
    .passage-text p { margin-bottom: 12px; }
    .passage-text mark {
      background: rgba(217, 119, 6, 0.15); padding: 1px 5px; border-radius: 4px;
      font-weight: 700; color: var(--gold);
    }

    /* Question card */
    .questions-section { margin-top: 22px; }
    .questions-header { display: flex; align-items: center; gap: 18px; margin-bottom: 18px; padding: 18px 22px; border-radius: 16px; background: linear-gradient(135deg, rgba(180, 83, 9, 0.06), rgba(180, 83, 9, 0.10)); border: 1px solid rgba(180, 83, 9, 0.20); }
    .questions-header-info { flex: 1; }
    .questions-header-label { font-family: var(--display); font-size: 10px; font-weight: 800; color: var(--gold); letter-spacing: 0.22em; text-transform: uppercase; margin-bottom: 4px; }
    .questions-header-instr { font-family: var(--arabic); font-size: 14px; color: var(--text); direction: rtl; font-weight: 600; }

    .q-card {
      padding: 22px 24px; border-radius: 18px;
      background: var(--paper); border: 1px solid var(--border);
      margin-bottom: 14px;
      transition: border-color 0.25s ease;
    }
    .q-card.is-revealed-right { border-color: var(--green); background: rgba(21, 128, 61, 0.04); }
    .q-card.is-revealed-wrong { border-color: var(--red); background: rgba(185, 28, 28, 0.04); }
    .q-num { font-family: var(--display); font-size: 11px; font-weight: 800; color: var(--gold); letter-spacing: 0.18em; text-transform: uppercase; margin-bottom: 8px; }
    .q-text { font-family: var(--display); font-size: 16px; font-weight: 700; color: var(--text); line-height: 1.5; margin-bottom: 14px; }
    .q-choices { display: grid; gap: 8px; }
    .q-choice {
      padding: 14px 18px; border-radius: 12px;
      background: var(--paper-soft); border: 1.5px solid var(--border-soft);
      font-family: var(--display); font-size: 14px; font-weight: 600; color: var(--text-2);
      text-align: left;
      transition: all 0.18s ease;
      display: flex; align-items: center; gap: 12px;
    }
    .q-choice:hover:not(:disabled) { border-color: var(--gold); background: var(--paper); transform: translateY(-1px); }
    .q-choice-letter {
      display: inline-flex; align-items: center; justify-content: center;
      width: 24px; height: 24px; border-radius: 6px;
      background: var(--paper-deep); color: var(--text-muted);
      font-family: var(--mono); font-size: 11px; font-weight: 700;
      flex-shrink: 0; border: 1px solid var(--border-soft);
    }
    .q-choice.is-right { background: rgba(21, 128, 61, 0.08); border-color: var(--green); color: var(--green); font-weight: 700; }
    .q-choice.is-right .q-choice-letter { background: var(--green); color: white; border-color: var(--green); }
    .q-choice.is-wrong { background: rgba(185, 28, 28, 0.08); border-color: var(--red); color: var(--red); }
    .q-choice.is-wrong .q-choice-letter { background: var(--red); color: white; border-color: var(--red); }
    .q-choice:disabled { cursor: not-allowed; }

    .summary-card {
      display: none;
      padding: 24px 28px; border-radius: 18px;
      background: linear-gradient(135deg, var(--ink), var(--ink-deep)); color: white;
      box-shadow: 0 12px 28px -10px rgba(28, 25, 23, 0.4);
      margin-top: 22px;
    }
    .summary-card.is-shown { display: flex; align-items: center; gap: 22px; flex-wrap: wrap; }
    .summary-info { flex: 1; min-width: 200px; }
    .summary-result { font-family: var(--display); font-size: 20px; font-weight: 800; margin-bottom: 4px; }
    .summary-result-ar { font-family: var(--arabic); font-size: 14px; color: rgba(253, 250, 240, 0.78); direction: rtl; font-weight: 600; }
    .summary-score { font-family: var(--display); font-size: 36px; font-weight: 900; color: #fbbf24; letter-spacing: -0.025em; line-height: 1; }
    .summary-score small { font-family: var(--display); font-size: 13px; color: rgba(255, 255, 255, 0.6); font-weight: 700; margin-left: 6px; }
    .summary-btn {
      padding: 13px 24px; border-radius: 12px;
      background: linear-gradient(135deg, var(--gold), var(--gold-bright)); color: white;
      border: none; font-family: var(--display); font-size: 13px; font-weight: 800; letter-spacing: -0.005em;
      box-shadow: 0 8px 18px -4px rgba(180, 83, 9, 0.45);
      transition: transform 0.18s ease;
    }
    .summary-btn:hover { transform: translateY(-2px); }

    @media (max-width: 640px) {
      .topbar { padding: 12px 16px; }
      .page { padding: 24px 14px; }
      .passage-card { padding: 26px 22px; }
    }
  </style>
</head>

<script>
function mascotSVG(mood) {
  const EYES = { default:'<circle cx="38" cy="58" r="6" fill="#fdfaf0"/><circle cx="62" cy="58" r="6" fill="#fdfaf0"/><circle cx="38" cy="59" r="3" fill="#1c1917"/><circle cx="62" cy="59" r="3" fill="#1c1917"/><circle cx="39" cy="57" r="1" fill="#fdfaf0"/><circle cx="63" cy="57" r="1" fill="#fdfaf0"/>', happy:'<path d="M 32 60 Q 38 53 44 60" stroke="#fdfaf0" stroke-width="2.5" fill="none" stroke-linecap="round"/><path d="M 56 60 Q 62 53 68 60" stroke="#fdfaf0" stroke-width="2.5" fill="none" stroke-linecap="round"/>', sad:'<circle cx="38" cy="60" r="6" fill="#fdfaf0"/><circle cx="62" cy="60" r="6" fill="#fdfaf0"/><circle cx="38" cy="62" r="3" fill="#1c1917"/><circle cx="62" cy="62" r="3" fill="#1c1917"/>', thinking:'<circle cx="38" cy="58" r="6" fill="#fdfaf0"/><circle cx="62" cy="58" r="6" fill="#fdfaf0"/><circle cx="40" cy="55" r="3" fill="#1c1917"/><circle cx="64" cy="55" r="3" fill="#1c1917"/>' }
  const MOUTHS = { default:'<path d="M 40 75 Q 50 80 60 75" stroke="#fdfaf0" stroke-width="2.5" fill="none" stroke-linecap="round"/>', happy:'<path d="M 32 72 Q 50 88 68 72 Q 50 80 32 72 Z" fill="#fdfaf0"/>', sad:'<path d="M 40 80 Q 50 73 60 80" stroke="#fdfaf0" stroke-width="2.5" fill="none" stroke-linecap="round"/>', thinking:'<path d="M 42 78 L 58 78" stroke="#fdfaf0" stroke-width="2.5" stroke-linecap="round"/>' }
  const m = mood || 'default'
  return `<line x1="50" y1="14" x2="74" y2="6" stroke="#fbbf24" stroke-width="2"/><circle cx="74" cy="6" r="3" fill="#fbbf24"/><rect x="32" y="12" width="36" height="14" rx="3" fill="#d97706"/><rect x="14" y="24" width="72" height="6" rx="2" fill="#b45309"/><circle cx="50" cy="62" r="34" fill="#1c1917"/><path d="M 18 112 Q 50 92 82 112 L 82 120 L 18 120 Z" fill="#1c1917"/>${EYES[m]||EYES.default}${MOUTHS[m]||MOUTHS.default}`
}
function setMascot(mood, bounce) {
  const el = document.getElementById('mascot')
  el.innerHTML = mascotSVG(mood)
  if (bounce) { el.classList.remove('is-bounce','is-shake'); void el.offsetWidth; el.classList.add(bounce === 'shake' ? 'is-shake' : 'is-bounce') }
}

function shuffle(arr) {
  const a = arr.slice()
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1))
    ;[a[i], a[j]] = [a[j], a[i]]
  }
  return a
}

function loadPassage() {
  answeredCount = 0
  correctInPassage = 0
  summaryEl.classList.remove('is-shown')
  setMascot('thinking')

  currentPassage = pool[idx]
  passEmoji.textContent = currentPassage.emoji
  passTitle.textContent = currentPassage.title
  passText.innerHTML = currentPassage.text
  passNumEl.textContent = `${idx + 1}/${pool.length}`
  // Word count
  const words = currentPassage.text.replace(/<[^>]+>/g, ' ').split(/\s+/).filter(Boolean)
  wordCount.textContent = `${words.length} words`

  questionsEl.innerHTML = currentPassage.qs.map((q, i) => `
    <div class="q-card" data-q="${i}">
      <div class="q-num">Question ${i + 1}</div>
      <div class="q-text">${esc(q.q)}</div>
      <div class="q-choices">
        ${q.c.map((c, ci) => `
          <button class="q-choice" data-correct="${ci === q.a ? '1' : '0'}">
            <span class="q-choice-letter">${'ABCD'[ci]}</span>
            <span>${esc(c)}</span>
          </button>
        `).join('')}
      </div>
    </div>
  `).join('')

  questionsEl.querySelectorAll('.q-card').forEach(card => {
    card.querySelectorAll('.q-choice').forEach(btn => {
      btn.addEventListener('click', () => handleAnswer(card, btn))
    })
  })
}

function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;') }

function handleAnswer(card, btn) {
  if (card.classList.contains('is-revealed-right') || card.classList.contains('is-revealed-wrong')) return
  const correct = btn.dataset.correct === '1'
  if (correct) {
    btn.classList.add('is-right')
    card.classList.add('is-revealed-right')
    correctInPassage++; totalCorrect++
    correctEl.textContent = String(totalCorrect)
  } else {
    btn.classList.add('is-wrong')
    card.classList.add('is-revealed-wrong')
    // Reveal correct answer too
    card.querySelectorAll('.q-choice').forEach(b => {
      if (b.dataset.correct === '1') b.classList.add('is-right')
    })
  }
  // Disable all choices in this card
  card.querySelectorAll('.q-choice').forEach(b => b.disabled = true)
  answeredCount++

  if (answeredCount === currentPassage.qs.length) {
    finishPassage()
  }
}

function finishPassage() {
  const total = currentPassage.qs.length
  summaryScore.innerHTML = `${correctInPassage}<small>/${total}</small>`
  if (correctInPassage === total) {
    summaryResult.textContent = '🎉 Perfect comprehension!'
    summaryResultAr.textContent = 'ممتاز — فهمت النص بالكامل'
    setMascot('happy', 'bounce')
  } else if (correctInPassage >= total - 1) {
    summaryResult.textContent = '👍 Almost perfect!'
    summaryResultAr.textContent = 'تقريباً ممتاز — فقط سؤال واحد'
    setMascot('happy')
  } else if (correctInPassage > 0) {
    summaryResult.textContent = '👌 Good effort'
    summaryResultAr.textContent = 'حاول مرة أخرى لتحصل على نتيجة أفضل'
    setMascot('default')
  } else {
    summaryResult.textContent = '💪 Keep practicing'
    summaryResultAr.textContent = 'اقرأ النص مجدداً وحاول مرة أخرى'
    setMascot('sad')
  }
  summaryEl.classList.add('is-shown')
}

nextBtn.addEventListener('click', () => {
  idx = (idx + 1) % pool.length
  loadPassage()
  window.scrollTo({ top: 0, behavior: 'smooth' })
})

document.querySelectorAll('.lev-btn').forEach(b => {
  b.addEventListener('click', () => {
    document.querySelectorAll('.lev-btn').forEach(x => x.classList.remove('is-active'))
    b.classList.add('is-active')
    currentLevel = b.dataset.level
    pool = shuffle(PASSAGES_BY_LEVEL[currentLevel])
    idx = 0; totalCorrect = 0
    correctEl.textContent = '0'
    loadPassage()
  })
})

pool = shuffle(PASSAGES_BY_LEVEL[currentLevel])
loadPassage()
</script>
</body>
</html>

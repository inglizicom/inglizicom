<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>Listen & Spell — Play · Inglizi.com</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800;900&family=DM+Sans:wght@400;500;600;700;800;900&family=Cairo:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    button { font-family: inherit; cursor: pointer; }
    a { text-decoration: none; color: inherit; }
    :root {
      --ink:#1c1917; --ink-deep:#0c0a09;
      --bg:#f5efe0; --paper:#fdfaf0; --paper-soft:#faf3e0; --paper-deep:#f0e6cd;
      --border:#e0d4b2; --border-soft:#ece2c5;
      --gold:#b45309; --gold-bright:#d97706; --gold-soft:#fef3c7;
      --text:#1c1917; --text-2:#44403c; --text-muted:#78716c;
      --green:#15803d; --red:#b91c1c;
      --display:'Outfit','DM Sans',system-ui,sans-serif;
      --sans:'DM Sans',sans-serif; --arabic:'Cairo','Tajawal',sans-serif;
      --mono:'JetBrains Mono',ui-monospace,monospace;
    }
    html, body { background: var(--bg); color: var(--text); font-family: var(--sans); font-size: 16px; min-height: 100%; -webkit-font-smoothing: antialiased; }
    body::before { content: ""; position: fixed; inset: 0; pointer-events: none; z-index: 0; background: radial-gradient(ellipse 60% 40% at 80% 0%, rgba(180, 83, 9, 0.08), transparent 60%); }

    .topbar { position: sticky; top: 0; z-index: 100; background: rgba(245, 239, 224, 0.85); backdrop-filter: blur(18px) saturate(180%); border-bottom: 1px solid var(--border-soft); padding: 14px 24px; display: flex; align-items: center; justify-content: space-between; gap: 14px; flex-wrap: wrap; }
    .back-link { display: inline-flex; align-items: center; gap: 10px; padding: 8px 14px; border-radius: 999px; background: var(--paper); border: 1px solid var(--border); font-family: var(--display); font-size: 13px; font-weight: 700; color: var(--text-2); transition: all 0.18s ease; }
    .back-link:hover { background: var(--ink); color: white; border-color: var(--ink); }
    .game-title { font-family: var(--display); font-weight: 900; font-size: 18px; letter-spacing: -0.02em; display: flex; align-items: center; gap: 10px; }
    .scoreboard { display: flex; gap: 12px; font-family: var(--display); font-size: 11px; font-weight: 700; color: var(--text-muted); letter-spacing: 0.08em; text-transform: uppercase; }
    .scoreboard b { color: var(--ink); font-family: var(--mono); font-size: 16px; font-weight: 800; margin-left: 4px; }
    .scoreboard b.streak { color: var(--gold); }

    .page { position: relative; z-index: 2; max-width: 760px; margin: 0 auto; padding: 32px 24px 60px; }

    .mascot-wrap { position: relative; display: inline-flex; }
    .mascot { filter: drop-shadow(0 6px 12px rgba(28, 25, 23, 0.25)); transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1); }
    .mascot.is-bounce { animation: bounce 0.5s ease; }
    @keyframes bounce { 50% { transform: translateY(-12px) rotate(-4deg); } }
    .mascot.is-shake { animation: shake-m 0.4s ease; }
    @keyframes shake-m { 25% { transform: translateX(-6px) rotate(-3deg); } 75% { transform: translateX(6px) rotate(3deg); } }

    .level-bar { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; margin-bottom: 22px; padding: 14px 18px; border-radius: 14px; background: var(--paper); border: 1px solid var(--border); }
    .level-bar-label { font-family: var(--display); font-size: 10px; font-weight: 800; color: var(--text-muted); letter-spacing: 0.18em; text-transform: uppercase; }
    .lev-btn { padding: 8px 14px; border-radius: 10px; background: transparent; border: 1.5px solid var(--border); font-family: var(--display); font-size: 12px; font-weight: 700; color: var(--text-2); transition: all 0.18s ease; }
    .lev-btn:hover { border-color: var(--gold); }
    .lev-btn.is-active { background: var(--ink); color: white; border-color: var(--ink); }

    /* Main card */
    .listen-card {
      display: flex; align-items: center; gap: 22px;
      padding: 36px 32px; border-radius: 24px;
      background: radial-gradient(ellipse 70% 50% at 100% 0%, rgba(217, 119, 6, 0.10), transparent 60%), linear-gradient(160deg, var(--paper), var(--paper-soft));
      border: 1px solid var(--border); margin-bottom: 22px;
      box-shadow: 0 12px 30px -12px rgba(115, 99, 53, 0.18); position: relative;
    }
    .listen-card::before { content: ""; position: absolute; top: 0; left: 0; right: 0; height: 4px; background: linear-gradient(90deg, var(--ink), var(--gold), var(--gold-bright)); border-radius: 24px 24px 0 0; }
    .listen-info { flex: 1; }
    .listen-label { font-family: var(--display); font-size: 10px; font-weight: 800; color: var(--gold); letter-spacing: 0.22em; text-transform: uppercase; margin-bottom: 10px; }
    .listen-hint { font-family: var(--arabic); font-size: 17px; color: var(--text); direction: rtl; font-weight: 700; line-height: 1.6; margin-bottom: 10px; }
    .listen-meta { font-family: var(--mono); font-size: 11px; color: var(--text-muted); letter-spacing: 0.05em; display: flex; gap: 12px; flex-wrap: wrap; }
    .listen-meta span { padding: 3px 8px; background: var(--paper-deep); border-radius: 5px; }

    /* Big play button */
    .play-zone { display: flex; justify-content: center; align-items: center; gap: 14px; padding: 26px 22px; border-radius: 22px; background: var(--paper); border: 1px solid var(--border); margin-bottom: 22px; }
    .big-play {
      width: 96px; height: 96px; border-radius: 50%;
      background: linear-gradient(135deg, var(--ink), var(--ink-deep));
      color: var(--gold-bright);
      display: flex; align-items: center; justify-content: center;
      border: none; cursor: pointer;
      font-size: 36px;
      box-shadow:
        inset 0 1px 0 rgba(255, 255, 255, 0.12),
        0 16px 32px -8px rgba(28, 25, 23, 0.4),
        0 6px 12px -3px rgba(180, 83, 9, 0.3);
      transition: all 0.22s ease;
    }
    .big-play:hover { transform: scale(1.05); }
    .big-play:active { transform: scale(0.95); }
    .big-play.is-playing { animation: ring 1s ease-in-out infinite; }
    @keyframes ring { 50% { box-shadow: 0 0 0 10px rgba(217, 119, 6, 0.18), 0 16px 32px -8px rgba(28, 25, 23, 0.4); } }
    .big-play .ico { font-size: 38px; line-height: 1; }
    .play-hint { font-family: var(--display); font-size: 13px; font-weight: 700; color: var(--text-muted); }
    .play-hint b { color: var(--ink); font-size: 14px; }
    .play-hint small { display: block; font-family: var(--arabic); color: var(--text-dim); margin-top: 2px; }

    /* Input */
    .input-row {
      display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 14px;
    }
    .spell-input {
      flex: 1; min-width: 200px;
      padding: 18px 22px; border-radius: 14px;
      background: var(--paper); border: 2px solid var(--border);
      font-family: var(--display); font-size: clamp(20px, 3vw, 26px); font-weight: 800;
      color: var(--text); letter-spacing: -0.01em;
      transition: border-color 0.2s ease;
      text-align: center; text-transform: lowercase;
    }
    .spell-input:focus { outline: none; border-color: var(--gold); }
    .spell-input.is-correct { border-color: var(--green); background: rgba(21, 128, 61, 0.06); color: var(--green); }
    .spell-input.is-wrong { border-color: var(--red); background: rgba(185, 28, 28, 0.06); color: var(--red); animation: shake-i 0.4s ease; }
    @keyframes shake-i { 25% { transform: translateX(-6px); } 75% { transform: translateX(6px); } }

    .feedback { min-height: 28px; margin-bottom: 16px; padding: 0 4px; font-family: var(--display); font-size: 14px; font-weight: 700; display: flex; align-items: center; gap: 10px; }
    .feedback.is-right { color: var(--green); }
    .feedback.is-wrong { color: var(--red); }
    .feedback-ar { font-family: var(--arabic); font-weight: 600; font-size: 14px; opacity: 0.85; }

    .actions { display: flex; gap: 12px; flex-wrap: wrap; }
    .btn { display: inline-flex; align-items: center; gap: 10px; padding: 14px 22px; border-radius: 12px; font-family: var(--display); font-size: 13px; font-weight: 800; letter-spacing: -0.005em; transition: all 0.18s ease; border: none; }
    .btn.is-primary { background: linear-gradient(135deg, var(--ink), var(--ink-deep)); color: white; box-shadow: 0 8px 18px -5px rgba(28, 25, 23, 0.32); }
    .btn.is-primary:hover { transform: translateY(-2px); }
    .btn.is-gold { background: linear-gradient(135deg, var(--gold), var(--gold-bright)); color: white; box-shadow: 0 8px 18px -5px rgba(180, 83, 9, 0.35); }
    .btn.is-gold:hover { transform: translateY(-2px); }
    .btn.is-secondary { background: var(--paper); color: var(--text-2); border: 1.5px solid var(--border); }
    .btn.is-secondary:hover { border-color: var(--gold); color: var(--gold); }

    @media (max-width: 640px) {
      .topbar { padding: 12px 16px; }
      .page { padding: 24px 14px; }
      .listen-card { flex-direction: column; align-items: flex-start; padding: 24px 22px; }
      .big-play { width: 80px; height: 80px; }
    }
  </style>
</head>
<body>

<nav class="topbar">
  <a href="../../" class="back-link">← All games</a>
  <div class="game-title">🔊 Listen &amp; Spell</div>
  <div class="scoreboard">
    <span>Score<b id="score">0</b></span>
    <span>Streak<b class="streak" id="streak">0</b></span>
  </div>
</nav>

<main class="page">

  <div class="level-bar">
    <span class="level-bar-label">Level · المستوى</span>
    <button class="lev-btn is-active" data-level="A1">Beginner · A0/A1</button>
    <button class="lev-btn" data-level="A2">Intermediate · A2/B1</button>
    <button class="lev-btn" data-level="B2">Advanced · B2</button>
  </div>

  <div class="listen-card">
    <div class="mascot-wrap">
      <svg width="80" height="96" viewBox="0 0 100 120" class="mascot" id="mascot"></svg>
    </div>
    <div class="listen-info">
      <div class="listen-label">Listen carefully · استمع جيداً</div>
      <div class="listen-hint" id="hint">—</div>
      <div class="listen-meta">
        <span id="meta-len">— letters</span>
        <span id="meta-pos">Word 1</span>
      </div>
    </div>
  </div>

  <div class="play-zone">
    <button class="big-play" id="play-btn" title="Play audio (Cmd+R to replay)">
      <span class="ico">🔊</span>
    </button>
    <div class="play-hint">
      <b>Click to hear the word</b>
      <small dir="rtl">اضغط لسماع الكلمة (يمكنك إعادة سماعها)</small>
    </div>
  </div>

  <div class="input-row">
    <input type="text" class="spell-input" id="spell-input" placeholder="type the word…" autocomplete="off" autocapitalize="off" spellcheck="false">
  </div>

  <div class="feedback" id="feedback"></div>

  <div class="actions">
    <button class="btn is-primary" id="check-btn">✓ Check</button>
    <button class="btn is-gold" id="next-btn" style="display:none;">Next word →</button>
    <button class="btn is-secondary" id="replay-btn">🔁 Replay audio</button>
    <button class="btn is-secondary" id="reveal-btn">💡 Show answer</button>
  </div>

</main>

<script>
// Mascot (shared character)
function mascotSVG(mood) {
  const EYES = {
    default:'<circle cx="38" cy="58" r="6" fill="#fdfaf0"/><circle cx="62" cy="58" r="6" fill="#fdfaf0"/><circle cx="38" cy="59" r="3" fill="#1c1917"/><circle cx="62" cy="59" r="3" fill="#1c1917"/><circle cx="39" cy="57" r="1" fill="#fdfaf0"/><circle cx="63" cy="57" r="1" fill="#fdfaf0"/>',
    happy:'<path d="M 32 60 Q 38 53 44 60" stroke="#fdfaf0" stroke-width="2.5" fill="none" stroke-linecap="round"/><path d="M 56 60 Q 62 53 68 60" stroke="#fdfaf0" stroke-width="2.5" fill="none" stroke-linecap="round"/>',
    sad:'<circle cx="38" cy="60" r="6" fill="#fdfaf0"/><circle cx="62" cy="60" r="6" fill="#fdfaf0"/><circle cx="38" cy="62" r="3" fill="#1c1917"/><circle cx="62" cy="62" r="3" fill="#1c1917"/>',
    thinking:'<circle cx="38" cy="58" r="6" fill="#fdfaf0"/><circle cx="62" cy="58" r="6" fill="#fdfaf0"/><circle cx="40" cy="55" r="3" fill="#1c1917"/><circle cx="64" cy="55" r="3" fill="#1c1917"/>',
  }
  const MOUTHS = {
    default:'<path d="M 40 75 Q 50 80 60 75" stroke="#fdfaf0" stroke-width="2.5" fill="none" stroke-linecap="round"/>',
    happy:'<path d="M 32 72 Q 50 88 68 72 Q 50 80 32 72 Z" fill="#fdfaf0"/>',
    sad:'<path d="M 40 80 Q 50 73 60 80" stroke="#fdfaf0" stroke-width="2.5" fill="none" stroke-linecap="round"/>',
    thinking:'<path d="M 42 78 L 58 78" stroke="#fdfaf0" stroke-width="2.5" stroke-linecap="round"/>',
  }
  const m = mood || 'default'
  return `<line x1="50" y1="14" x2="74" y2="6" stroke="#fbbf24" stroke-width="2"/><circle cx="74" cy="6" r="3" fill="#fbbf24"/><rect x="32" y="12" width="36" height="14" rx="3" fill="#d97706"/><rect x="14" y="24" width="72" height="6" rx="2" fill="#b45309"/><circle cx="50" cy="62" r="34" fill="#1c1917"/><path d="M 18 112 Q 50 92 82 112 L 82 120 L 18 120 Z" fill="#1c1917"/>${EYES[m]||EYES.default}${MOUTHS[m]||MOUTHS.default}`
}
function setMascot(mood, bounce) {
  const el = document.getElementById('mascot')
  el.innerHTML = mascotSVG(mood)
  if (bounce) { el.classList.remove('is-bounce','is-shake'); void el.offsetWidth; el.classList.add(bounce === 'shake' ? 'is-shake' : 'is-bounce') }
}

// TTS with cache + browser fallback
const TTS_ENDPOINT = 'https://inglizi.com/api/tts'
const audioCache = new Map()
let currentAudio = null
let preferredEnVoice = null
function loadVoices() {
  if (!window.speechSynthesis) return
  const voices = speechSynthesis.getVoices()
  preferredEnVoice = voices.find(v => v.lang === 'en-US' && /Samantha|Allison|Karen|Daniel/i.test(v.name))
    || voices.find(v => v.lang === 'en-US')
    || voices.find(v => v.lang?.startsWith('en')) || null
}
if (window.speechSynthesis) { loadVoices(); speechSynthesis.onvoiceschanged = loadVoices }
function browserSpeak(text) {
  if (!window.speechSynthesis) return Promise.resolve()
  return new Promise(resolve => {
    speechSynthesis.cancel()
    const u = new SpeechSynthesisUtterance(text)
    u.lang = 'en-US'
    if (preferredEnVoice) u.voice = preferredEnVoice
    u.rate = 0.9; u.onend = resolve; u.onerror = resolve
    speechSynthesis.speak(u)
  })
}
async function speak(text) {
  stopSpeak()
  try {
    let url = audioCache.get(text)
    if (!url) {
      const res = await fetch(TTS_ENDPOINT, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ text }) })
      if (!res.ok) throw new Error('TTS ' + res.status)
      const blob = await res.blob()
      url = URL.createObjectURL(blob)
      audioCache.set(text, url)
    }
    return new Promise(resolve => {
      const a = new Audio(url); currentAudio = a
      a.onended = resolve; a.onerror = () => browserSpeak(text).then(resolve)
      a.play().catch(() => browserSpeak(text).then(resolve))
    })
  } catch { return browserSpeak(text) }
}
function stopSpeak() {
  try { speechSynthesis.cancel() } catch {}
  if (currentAudio) { try { currentAudio.pause() } catch {}; currentAudio = null }
}

// Words by level
const WORDS_BY_LEVEL = {
  A1: [
    { en:'morning', ar:'الصباح' }, { en:'water', ar:'الماء' }, { en:'family', ar:'العائلة' },
    { en:'school', ar:'المدرسة' }, { en:'friend', ar:'الصديق' }, { en:'coffee', ar:'القهوة' },
    { en:'house', ar:'البيت' }, { en:'book', ar:'الكتاب' }, { en:'happy', ar:'سعيد' },
    { en:'small', ar:'صغير' }, { en:'today', ar:'اليوم' }, { en:'apple', ar:'تفاحة' },
    { en:'window', ar:'النافذة' }, { en:'door', ar:'الباب' }, { en:'street', ar:'الشارع' },
    { en:'tired', ar:'متعب' }, { en:'father', ar:'الأب' }, { en:'mother', ar:'الأم' },
  ],
  A2: [
    { en:'meeting', ar:'الاجتماع' }, { en:'company', ar:'الشركة' }, { en:'project', ar:'المشروع' },
    { en:'manager', ar:'المدير' }, { en:'customer', ar:'الزبون' }, { en:'invoice', ar:'الفاتورة' },
    { en:'beautiful', ar:'جميل' }, { en:'important', ar:'مهم' }, { en:'difficult', ar:'صعب' },
    { en:'expensive', ar:'غالٍ' }, { en:'remember', ar:'يتذكر' }, { en:'understand', ar:'يفهم' },
    { en:'travel', ar:'يسافر' }, { en:'develop', ar:'يطوّر' }, { en:'language', ar:'اللغة' },
    { en:'computer', ar:'الحاسوب' }, { en:'airport', ar:'المطار' }, { en:'medicine', ar:'الدواء' },
  ],
  B2: [
    { en:'opportunity', ar:'الفرصة' }, { en:'experience', ar:'الخبرة' }, { en:'achievement', ar:'الإنجاز' },
    { en:'environment', ar:'البيئة' }, { en:'consequence', ar:'النتيجة' }, { en:'recommend', ar:'يوصي' },
    { en:'negotiate', ar:'يتفاوض' }, { en:'authentic', ar:'أصلي' }, { en:'abundant', ar:'وفير' },
    { en:'meticulous', ar:'دقيق' }, { en:'ambiguous', ar:'غامض' }, { en:'tenacious', ar:'مثابر' },
    { en:'collaborate', ar:'يتعاون' }, { en:'demonstrate', ar:'يبرهن' }, { en:'spontaneous', ar:'تلقائي' },
    { en:'efficiency', ar:'كفاءة' }, { en:'strategy', ar:'استراتيجية' }, { en:'innovation', ar:'ابتكار' },
  ],
}

let currentLevel = 'A1'
let pool = WORDS_BY_LEVEL[currentLevel].slice()
let idx = 0
let score = 0, streak = 0
let solved = false

const hintEl = document.getElementById('hint')
const metaLenEl = document.getElementById('meta-len')
const metaPosEl = document.getElementById('meta-pos')
const inputEl = document.getElementById('spell-input')
const feedbackEl = document.getElementById('feedback')
const scoreEl = document.getElementById('score')
const streakEl = document.getElementById('streak')
const playBtn = document.getElementById('play-btn')
const checkBtn = document.getElementById('check-btn')
const nextBtn = document.getElementById('next-btn')
const replayBtn = document.getElementById('replay-btn')
const revealBtn = document.getElementById('reveal-btn')

function shuffle(arr) {
  const a = arr.slice()
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1))
    ;[a[i], a[j]] = [a[j], a[i]]
  }
  return a
}

function loadWord(autoPlay = true) {
  solved = false
  feedbackEl.textContent = ''; feedbackEl.className = 'feedback'
  inputEl.className = 'spell-input'; inputEl.value = ''; inputEl.disabled = false
  checkBtn.disabled = false; checkBtn.style.display = ''
  nextBtn.style.display = 'none'
  const w = pool[idx]
  hintEl.textContent = w.ar
  metaLenEl.textContent = `${w.en.length} letters`
  metaPosEl.textContent = `Word ${idx + 1}`
  setMascot('thinking')
  inputEl.focus()
  if (autoPlay) setTimeout(() => playCurrent(), 300)
}

async function playCurrent() {
  if (!pool[idx]) return
  playBtn.classList.add('is-playing')
  await speak(pool[idx].en)
  playBtn.classList.remove('is-playing')
}

function check() {
  if (solved) return
  const user = inputEl.value.trim().toLowerCase()
  const correct = pool[idx].en.toLowerCase()
  if (user === correct) {
    score++; streak++
    scoreEl.textContent = String(score); streakEl.textContent = String(streak)
    feedbackEl.innerHTML = `✓ Correct! <span class="feedback-ar">إجابة صحيحة — ${pool[idx].en}</span>`
    feedbackEl.className = 'feedback is-right'
    inputEl.classList.add('is-correct'); inputEl.disabled = true
    solved = true; checkBtn.disabled = true; nextBtn.style.display = ''
    setMascot('happy', 'bounce')
  } else {
    streak = 0; streakEl.textContent = '0'
    feedbackEl.innerHTML = `✗ Not quite. Try again. <span class="feedback-ar">حاول مرة أخرى</span>`
    feedbackEl.className = 'feedback is-wrong'
    inputEl.classList.add('is-wrong')
    setTimeout(() => inputEl.classList.remove('is-wrong'), 500)
    setMascot('sad', 'shake')
    setTimeout(() => { if (!solved) setMascot('thinking') }, 700)
    inputEl.select()
  }
}

function reveal() {
  if (solved) return
  inputEl.value = pool[idx].en
  inputEl.classList.add('is-correct'); inputEl.disabled = true
  feedbackEl.innerHTML = `💡 The word is "${pool[idx].en}"`
  feedbackEl.className = 'feedback'
  solved = true; checkBtn.disabled = true; nextBtn.style.display = ''
  streak = 0; streakEl.textContent = '0'
  setMascot('sad')
}

function next() {
  idx = (idx + 1) % pool.length
  loadWord(true)
}

playBtn.addEventListener('click', playCurrent)
replayBtn.addEventListener('click', playCurrent)
checkBtn.addEventListener('click', check)
nextBtn.addEventListener('click', next)
revealBtn.addEventListener('click', reveal)
inputEl.addEventListener('keydown', e => {
  if (e.key === 'Enter') {
    e.preventDefault()
    if (solved) next(); else check()
  }
})

document.querySelectorAll('.lev-btn').forEach(b => {
  b.addEventListener('click', () => {
    document.querySelectorAll('.lev-btn').forEach(x => x.classList.remove('is-active'))
    b.classList.add('is-active')
    currentLevel = b.dataset.level
    pool = shuffle(WORDS_BY_LEVEL[currentLevel])
    idx = 0; score = 0; streak = 0
    scoreEl.textContent = '0'; streakEl.textContent = '0'
    loadWord(true)
  })
})

// Boot
pool = shuffle(WORDS_BY_LEVEL[currentLevel])
loadWord(false)  // don't auto-play first time (needs user gesture for audio)
</script>
</body>
</html>

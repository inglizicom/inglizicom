    {ico:'🎁',situation:'Receiving an unexpected promotion.',avatar:'🚀',speaker:'CEO',speech:'We\'re promoting you to senior manager.',reply:'I\'m truly honored. Thank you for the opportunity.',distractors:['Are you sure?','I don\'t want it.','Bless you!'],why:'Accept honors with humility and gratitude.'},
    {ico:'🕰️',situation:'Asking for a deadline extension.',avatar:'⏳',speaker:'You to your boss',speech:'(You need to ask): "I need more time."',reply:'Would it be possible to extend the deadline by a few days?',distractors:['I won\'t finish.','Whatever.','It\'s done already.'],why:'Use a polite, indirect formulation for requests.'},
    {ico:'😬',situation:'Apologizing for a serious mistake.',avatar:'💔',speaker:'You to client',speech:'(You need to apologize)',reply:'I take full responsibility for what happened, and here is what I\'m doing to fix it.',distractors:['It wasn\'t my fault.','Get over it.','Bless you!'],why:'Own the mistake fully and present a remedy.'},
    {ico:'🌐',situation:'Declining an invitation politely.',avatar:'📅',speaker:'Friend',speech:'Want to come to my party Saturday?',reply:'I\'d love to, but I have another commitment. Maybe next time?',distractors:['No way.','Boring.','I\'ll come, but I\'ll be late on purpose.'],why:'Decline warmly, give a brief reason, leave the door open.'},
  ],
}

let currentLevel='A2',pool=[],idx=0,score=0,streak=0,answered=false
const ico=document.getElementById('situ-ico'),situText=document.getElementById('situ-text'),avatar=document.getElementById('avatar'),speaker=document.getElementById('speaker'),speech=document.getElementById('speech'),choicesEl=document.getElementById('choices'),feedbackEl=document.getElementById('feedback'),explainEl=document.getElementById('explain'),explainText=document.getElementById('explain-text'),scoreEl=document.getElementById('score'),streakEl=document.getElementById('streak'),nextBtn=document.getElementById('next-btn'),progressEl=document.getElementById('progress'),gameAreaEl=document.getElementById('game-area'),summaryEl=document.getElementById('summary')
function shuffle(a){a=a.slice();for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a}
function startLevel(lv){currentLevel=lv;pool=shuffle(SCENES[lv]).slice(0,10);idx=0;score=0;streak=0;scoreEl.textContent='0';streakEl.textContent='0';summaryEl.classList.remove('is-shown');gameAreaEl.style.display='';if(window.PlayProgress)PlayProgress.injectBestPill(document.getElementById('level-bar'),GAME_ID,currentLevel);loadQ()}
function loadQ(){answered=false;feedbackEl.textContent='';feedbackEl.className='feedback';explainEl.classList.remove('is-shown');nextBtn.style.display='none';progressEl.style.width=((idx/pool.length)*100)+'%';if(idx>=pool.length){finish();return}
  const s=pool[idx];ico.textContent=s.ico;situText.textContent=s.situation;avatar.textContent=s.avatar;speaker.textContent=s.speaker+' says';speech.textContent='"'+s.speech+'"'
  const opts=shuffle([{t:s.reply,c:true},...s.distractors.map(t=>({t,c:false}))])
  const labels=['A','B','C','D']
  choicesEl.innerHTML=''
  opts.forEach((o,i)=>{const b=document.createElement('button');b.className='choice';b.innerHTML=`<span class="lbl">${labels[i]}</span><span>${o.t}</span>`;b.addEventListener('click',()=>pick(b,o.c));choicesEl.appendChild(b)})
}
function pick(btn,correct){if(answered)return;answered=true;const s=pool[idx];const all=choicesEl.querySelectorAll('.choice');all.forEach(b=>b.disabled=true)
  if(correct){btn.classList.add('is-correct');score++;streak++;scoreEl.textContent=score;streakEl.textContent=streak;feedbackEl.textContent='✓ Natural reply!';feedbackEl.className='feedback is-right'}
  else{btn.classList.add('is-wrong');streak=0;streakEl.textContent='0';all.forEach(b=>{if(b.querySelector('span:last-child').textContent===s.reply)b.classList.add('is-correct')});feedbackEl.textContent='✗ Not the best fit';feedbackEl.className='feedback is-wrong'}
  explainText.textContent=s.why; explainEl.classList.add('is-shown')
  nextBtn.style.display='inline-flex'
}
function finish(){const prevBest=window.PlayProgress?PlayProgress.getLevel(GAME_ID,currentLevel).best:0;const lv=window.PlayProgress?PlayProgress.record(GAME_ID,currentLevel,score,pool.length):{best:score};const acc=Math.round((score/pool.length)*100);document.getElementById('final-score').textContent=`${score}/${pool.length}`;document.getElementById('final-acc').textContent=acc+'%';document.getElementById('final-best').textContent=lv.best;let t='🏆',ti='Brilliant!',su='ممتاز!';if(acc<50){t='💪';ti='Keep practicing';su='استمر!'}else if(acc<80){t='👍';ti='Good job';su='أداء جيد.'}document.getElementById('summary-trophy').textContent=t;document.getElementById('summary-title').textContent=ti;document.getElementById('summary-sub').textContent=su;document.getElementById('new-best-banner').innerHTML=(score>prevBest&&prevBest>0)?'<span class="new-best">🌟 New best!</span>':'';gameAreaEl.style.display='none';summaryEl.classList.add('is-shown');if(window.PlayProgress)PlayProgress.injectBestPill(document.getElementById('level-bar'),GAME_ID,currentLevel)}
nextBtn.addEventListener('click',()=>{idx++;loadQ()})
document.getElementById('play-again-btn').addEventListener('click',()=>startLevel(currentLevel))
document.querySelectorAll('.lev-btn').forEach(b=>b.addEventListener('click',()=>{document.querySelectorAll('.lev-btn').forEach(x=>x.classList.remove('is-active'));b.classList.add('is-active');startLevel(b.dataset.level)}))
startLevel('A2')
</script>
</body>

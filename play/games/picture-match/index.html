<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>Picture Match — Play · Inglizi.com</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800;900&family=DM+Sans:wght@400;500;600;700;800;900&family=Cairo:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    button { font-family: inherit; cursor: pointer; }
    a { text-decoration: none; color: inherit; }
    :root {
      --ink:#1c1917; --ink-deep:#0c0a09;
      --bg:#f5efe0; --paper:#fdfaf0; --paper-soft:#faf3e0; --paper-deep:#f0e6cd;
      --border:#e0d4b2; --border-soft:#ece2c5;
      --gold:#b45309; --gold-bright:#d97706; --gold-soft:#fef3c7;
      --text:#1c1917; --text-2:#44403c; --text-muted:#78716c;
      --green:#15803d; --red:#b91c1c;
      --display:'Outfit','DM Sans',system-ui,sans-serif; --sans:'DM Sans',sans-serif;
      --arabic:'Cairo','Tajawal',sans-serif; --mono:'JetBrains Mono',ui-monospace,monospace;
    }
    html, body { background: var(--bg); color: var(--text); font-family: var(--sans); font-size: 16px; min-height: 100%; -webkit-font-smoothing: antialiased; }
    body::before { content: ""; position: fixed; inset: 0; pointer-events: none; z-index: 0; background: radial-gradient(ellipse 60% 40% at 80% 0%, rgba(180, 83, 9, 0.08), transparent 60%); }

    .topbar { position: sticky; top: 0; z-index: 100; background: rgba(245, 239, 224, 0.85); backdrop-filter: blur(18px) saturate(180%); border-bottom: 1px solid var(--border-soft); padding: 14px 24px; display: flex; align-items: center; justify-content: space-between; gap: 14px; flex-wrap: wrap; }
    .back-link { display: inline-flex; align-items: center; gap: 10px; padding: 8px 14px; border-radius: 999px; background: var(--paper); border: 1px solid var(--border); font-family: var(--display); font-size: 13px; font-weight: 700; color: var(--text-2); }
    .back-link:hover { background: var(--ink); color: white; border-color: var(--ink); }
    .game-title { font-family: var(--display); font-weight: 900; font-size: 18px; }
    .scoreboard { display: flex; gap: 12px; font-family: var(--display); font-size: 11px; font-weight: 700; color: var(--text-muted); letter-spacing: 0.08em; text-transform: uppercase; }
    .scoreboard b { color: var(--ink); font-family: var(--mono); font-size: 16px; font-weight: 800; margin-left: 4px; }
    .scoreboard b.streak { color: var(--gold); }

    .page { position: relative; z-index: 2; max-width: 760px; margin: 0 auto; padding: 28px 24px 60px; }

    .mascot { filter: drop-shadow(0 6px 12px rgba(28, 25, 23, 0.25)); transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1); }
    .mascot.is-bounce { animation: bounce 0.5s ease; }
    @keyframes bounce { 50% { transform: translateY(-12px) rotate(-4deg); } }
    .mascot.is-shake { animation: shake-m 0.4s ease; }
    @keyframes shake-m { 25% { transform: translateX(-6px) rotate(-3deg); } 75% { transform: translateX(6px) rotate(3deg); } }

    .level-bar { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; margin-bottom: 18px; padding: 14px 18px; border-radius: 14px; background: var(--paper); border: 1px solid var(--border); }
    .level-bar-label { font-family: var(--display); font-size: 10px; font-weight: 800; color: var(--text-muted); letter-spacing: 0.18em; text-transform: uppercase; }
    .lev-btn { padding: 8px 14px; border-radius: 10px; background: transparent; border: 1.5px solid var(--border); font-family: var(--display); font-size: 12px; font-weight: 700; color: var(--text-2); transition: all 0.18s ease; }
    .lev-btn:hover { border-color: var(--gold); }
    .lev-btn.is-active { background: var(--ink); color: white; border-color: var(--ink); }

    .progress-bar { height: 6px; background: var(--paper-deep); border-radius: 999px; overflow: hidden; margin-bottom: 18px; }
    .progress-bar > span { display: block; height: 100%; background: linear-gradient(90deg, var(--gold), var(--gold-bright)); transition: width 0.3s ease; width: 0%; }

    .pic-card {
      position: relative;
      padding: 36px 30px 28px; border-radius: 24px;
      background: radial-gradient(ellipse 70% 50% at 100% 0%, rgba(217, 119, 6, 0.10), transparent 60%), linear-gradient(160deg, var(--paper), var(--paper-soft));
      border: 1px solid var(--border); margin-bottom: 18px;
      box-shadow: 0 16px 36px -14px rgba(115, 99, 53, 0.20);
      text-align: center;
    }
    .pic-card::before { content: ""; position: absolute; top: 0; left: 0; right: 0; height: 5px; background: linear-gradient(90deg, var(--ink), var(--gold), var(--gold-bright)); border-radius: 24px 24px 0 0; }
    .card-mascot { position: absolute; top: -26px; left: 28px; }
    .listen-btn { position: absolute; top: 16px; right: 16px; width: 42px; height: 42px; border-radius: 50%; background: var(--ink); color: white; border: none; font-size: 18px; display: inline-flex; align-items: center; justify-content: center; transition: all 0.18s ease; box-shadow: 0 6px 14px -4px rgba(28,25,23,0.4); }
    .listen-btn:hover { transform: scale(1.08); background: var(--gold-bright); }
    .listen-btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .listen-btn.is-loading { animation: spin 1s linear infinite; }
    @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    .pic-label { font-family: var(--display); font-size: 10px; font-weight: 800; color: var(--gold); letter-spacing: 0.22em; text-transform: uppercase; margin-bottom: 14px; }
    .pic-emoji { font-size: clamp(72px, 14vw, 120px); line-height: 1; margin: 8px 0; }
    .pic-q { font-family: var(--display); font-size: 14px; color: var(--text-muted); font-weight: 600; font-style: italic; }

    .choices { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 16px; }
    .choice {
      padding: 18px 18px; border-radius: 14px;
      background: var(--paper); border: 2px solid var(--border);
      font-family: var(--display); font-size: 17px; font-weight: 800;
      color: var(--text); text-align: center;
      transition: all 0.18s ease;
    }
    .choice:hover:not(:disabled) { transform: translateY(-2px); border-color: var(--gold); color: var(--gold); }
    .choice.is-correct { background: rgba(21,128,61,0.12); border-color: var(--green); color: var(--green); }
    .choice.is-wrong { background: rgba(185,28,28,0.12); border-color: var(--red); color: var(--red); animation: shake-i 0.4s ease; }
    @keyframes shake-i { 25% { transform: translateX(-6px); } 75% { transform: translateX(6px); } }
    .choice:disabled { cursor: not-allowed; }

    .feedback { min-height: 24px; padding: 0 4px; font-family: var(--display); font-size: 14px; font-weight: 700; text-align: center; margin-bottom: 12px; }
    .feedback.is-right { color: var(--green); }
    .feedback.is-wrong { color: var(--red); }

    .actions { display: flex; gap: 12px; flex-wrap: wrap; justify-content: center; }
    .btn { display: inline-flex; align-items: center; gap: 10px; padding: 14px 26px; border-radius: 12px; font-family: var(--display); font-size: 14px; font-weight: 800; transition: all 0.18s ease; border: none; }
    .btn.is-gold { background: linear-gradient(135deg, var(--gold), var(--gold-bright)); color: white; box-shadow: 0 8px 18px -5px rgba(180, 83, 9, 0.35); }
    .btn.is-gold:hover { transform: translateY(-2px); }

    .summary { display: none; padding: 36px 28px; border-radius: 24px; background: linear-gradient(160deg, var(--paper), var(--paper-soft)); border: 1px solid var(--border); text-align: center; box-shadow: 0 16px 36px -14px rgba(115, 99, 53, 0.20); }
    .summary.is-shown { display: block; }
    .summary-trophy { font-size: 56px; margin-bottom: 10px; }
    .summary-title { font-family: var(--display); font-size: 26px; font-weight: 900; letter-spacing: -0.02em; margin-bottom: 6px; }
    .summary-sub { font-family: var(--arabic); font-size: 14px; color: var(--text-muted); direction: rtl; margin-bottom: 18px; }
    .summary-stats { display: flex; gap: 22px; justify-content: center; flex-wrap: wrap; margin-bottom: 18px; padding: 18px; border-top: 1px dashed var(--border); border-bottom: 1px dashed var(--border); }
    .stat { display: flex; flex-direction: column; gap: 4px; }
    .stat-num { font-family: var(--display); font-size: 26px; font-weight: 900; color: var(--gold); letter-spacing: -0.02em; line-height: 1; }
    .stat-lbl { font-family: var(--display); font-size: 10px; font-weight: 700; color: var(--text-muted); letter-spacing: 0.18em; text-transform: uppercase; }
    .new-best { display: inline-block; margin-top: 10px; padding: 5px 14px; border-radius: 999px; background: var(--gold); color: white; font-family: var(--display); font-size: 11px; font-weight: 800; letter-spacing: 0.15em; text-transform: uppercase; }

    @media (max-width: 640px) {
      .topbar { padding: 12px 16px; }
      .page { padding: 22px 14px; }
      .pic-card { padding: 32px 18px 24px; }
      .card-mascot { left: 50%; transform: translateX(-50%); top: -32px; }
      .listen-btn { top: 12px; right: 12px; }
    }
  </style>
</head>
<body>

<nav class="topbar">
  <a href="../../" class="back-link">← All games</a>
  <div class="game-title">🖼️ Picture Match</div>
  <div class="scoreboard">
    <span>Score<b id="score">0</b></span>
    <span>Streak<b class="streak" id="streak">0</b></span>
  </div>
</nav>

<main class="page">

  <div class="level-bar" id="level-bar">
    <span class="level-bar-label">Level</span>
    <button class="lev-btn is-active" data-level="A0">A0 · First words</button>
    <button class="lev-btn" data-level="A1">A1 · Beginner</button>
    <button class="lev-btn" data-level="A2">A2 · Elementary</button>
  </div>

  <div class="progress-bar"><span id="progress"></span></div>

  <div id="game-area">
    <div class="pic-card">
      <div class="card-mascot">
        <svg width="68" height="82" viewBox="0 0 100 120" class="mascot" id="mascot"></svg>
      </div>
      <button class="listen-btn" id="listen-btn" title="Hear pronunciation">🔊</button>
      <div class="pic-label">What is this?</div>
      <div class="pic-emoji" id="emoji">🐱</div>
      <div class="pic-q">Tap the correct word ↓</div>
    </div>

    <div class="choices" id="choices"></div>

    <div class="feedback" id="feedback"></div>

    <div class="actions">
      <button class="btn is-gold" id="next-btn" style="display:none;">Next →</button>
    </div>
  </div>

  <div class="summary" id="summary">
    <div class="summary-trophy" id="summary-trophy">🏆</div>
    <div class="summary-title" id="summary-title">Brilliant!</div>
    <div class="summary-sub" id="summary-sub">أحسنت! واصل التقدم.</div>
    <div class="summary-stats">
      <div class="stat"><span class="stat-num" id="final-score">0</span><span class="stat-lbl">Score</span></div>
      <div class="stat"><span class="stat-num" id="final-acc">0%</span><span class="stat-lbl">Accuracy</span></div>
      <div class="stat"><span class="stat-num" id="final-best">0</span><span class="stat-lbl">Best</span></div>
    </div>
    <div id="new-best-banner"></div>
    <div style="margin-top:14px;">
      <button class="btn is-gold" id="play-again-btn">Play again</button>
    </div>
  </div>

</main>

<script src="../../_shared/progress.js"></script>
<script>
const GAME_ID = 'picture-match'

function mascotSVG(mood) {
  const EYES = { default:'<circle cx="38" cy="58" r="6" fill="#fdfaf0"/><circle cx="62" cy="58" r="6" fill="#fdfaf0"/><circle cx="38" cy="59" r="3" fill="#1c1917"/><circle cx="62" cy="59" r="3" fill="#1c1917"/><circle cx="39" cy="57" r="1" fill="#fdfaf0"/><circle cx="63" cy="57" r="1" fill="#fdfaf0"/>', happy:'<path d="M 32 60 Q 38 53 44 60" stroke="#fdfaf0" stroke-width="2.5" fill="none" stroke-linecap="round"/><path d="M 56 60 Q 62 53 68 60" stroke="#fdfaf0" stroke-width="2.5" fill="none" stroke-linecap="round"/>', sad:'<circle cx="38" cy="60" r="6" fill="#fdfaf0"/><circle cx="62" cy="60" r="6" fill="#fdfaf0"/><circle cx="38" cy="62" r="3" fill="#1c1917"/><circle cx="62" cy="62" r="3" fill="#1c1917"/>', thinking:'<circle cx="38" cy="58" r="6" fill="#fdfaf0"/><circle cx="62" cy="58" r="6" fill="#fdfaf0"/><circle cx="40" cy="55" r="3" fill="#1c1917"/><circle cx="64" cy="55" r="3" fill="#1c1917"/>' }
  const MOUTHS = { default:'<path d="M 40 75 Q 50 80 60 75" stroke="#fdfaf0" stroke-width="2.5" fill="none" stroke-linecap="round"/>', happy:'<path d="M 32 72 Q 50 88 68 72 Q 50 80 32 72 Z" fill="#fdfaf0"/>', sad:'<path d="M 40 80 Q 50 73 60 80" stroke="#fdfaf0" stroke-width="2.5" fill="none" stroke-linecap="round"/>', thinking:'<path d="M 42 78 L 58 78" stroke="#fdfaf0" stroke-width="2.5" stroke-linecap="round"/>' }
  const m = mood || 'default'
  return `<line x1="50" y1="14" x2="74" y2="6" stroke="#fbbf24" stroke-width="2"/><circle cx="74" cy="6" r="3" fill="#fbbf24"/><rect x="32" y="12" width="36" height="14" rx="3" fill="#d97706"/><rect x="14" y="24" width="72" height="6" rx="2" fill="#b45309"/><circle cx="50" cy="62" r="34" fill="#1c1917"/><path d="M 18 112 Q 50 92 82 112 L 82 120 L 18 120 Z" fill="#1c1917"/>${EYES[m]||EYES.default}${MOUTHS[m]||MOUTHS.default}`
}
function setMascot(mood, bounce) {
  const el = document.getElementById('mascot')
  el.innerHTML = mascotSVG(mood)
  if (bounce) { el.classList.remove('is-bounce','is-shake'); void el.offsetWidth; el.classList.add(bounce === 'shake' ? 'is-shake' : 'is-bounce') }
}

const ITEMS_BY_LEVEL = {
  A0: [
    {e:'🐱', w:'cat'},{e:'🐶', w:'dog'},{e:'🐟', w:'fish'},{e:'🐦', w:'bird'},{e:'🐎', w:'horse'},{e:'🐄', w:'cow'},
    {e:'🍎', w:'apple'},{e:'🍌', w:'banana'},{e:'🍞', w:'bread'},{e:'🥛', w:'milk'},{e:'🥚', w:'egg'},{e:'🧀', w:'cheese'},
    {e:'🏠', w:'house'},{e:'🚗', w:'car'},{e:'📚', w:'book'},{e:'🪑', w:'chair'},{e:'🛏️', w:'bed'},{e:'🚪', w:'door'},
    {e:'☀️', w:'sun'},{e:'🌙', w:'moon'},{e:'⭐', w:'star'},{e:'🌧️', w:'rain'},
  ],
  A1: [
    {e:'👨‍⚕️', w:'doctor'},{e:'👩‍🏫', w:'teacher'},{e:'👮', w:'police'},{e:'👨‍🍳', w:'chef'},{e:'👨‍🚒', w:'firefighter'},{e:'🧑‍🌾', w:'farmer'},
    {e:'⚽', w:'football'},{e:'🏀', w:'basketball'},{e:'🎾', w:'tennis'},{e:'🏊', w:'swimming'},{e:'🚴', w:'cycling'},{e:'🏃', w:'running'},
    {e:'🍕', w:'pizza'},{e:'🍔', w:'burger'},{e:'🍝', w:'pasta'},{e:'🍣', w:'sushi'},{e:'🥗', w:'salad'},{e:'🍰', w:'cake'},
    {e:'🌍', w:'earth'},{e:'🌳', w:'tree'},{e:'🌸', w:'flower'},{e:'🏖️', w:'beach'},{e:'🏔️', w:'mountain'},
  ],
  A2: [
    {e:'🎻', w:'violin'},{e:'🎸', w:'guitar'},{e:'🥁', w:'drums'},{e:'🎹', w:'piano'},{e:'🎺', w:'trumpet'},{e:'🎷', w:'saxophone'},
    {e:'🦒', w:'giraffe'},{e:'🐘', w:'elephant'},{e:'🦁', w:'lion'},{e:'🐘', w:'elephant'},{e:'🦓', w:'zebra'},{e:'🐊', w:'crocodile'},
    {e:'🔬', w:'microscope'},{e:'🔭', w:'telescope'},{e:'🧪', w:'test tube'},{e:'📡', w:'satellite'},{e:'⚖️', w:'scale'},{e:'🧭', w:'compass'},
    {e:'🏛️', w:'museum'},{e:'🏟️', w:'stadium'},{e:'🏥', w:'hospital'},{e:'🏪', w:'shop'},{e:'⛪', w:'church'},{e:'🏫', w:'school'},
  ],
}

let currentLevel = 'A0'
let pool = []
let idx = 0
let score = 0, streak = 0
let answered = false

const emojiEl = document.getElementById('emoji')
const choicesEl = document.getElementById('choices')
const feedbackEl = document.getElementById('feedback')
const scoreEl = document.getElementById('score')
const streakEl = document.getElementById('streak')
const nextBtn = document.getElementById('next-btn')
const listenBtn = document.getElementById('listen-btn')
const progressEl = document.getElementById('progress')
const gameAreaEl = document.getElementById('game-area')
const summaryEl = document.getElementById('summary')

function shuffle(arr) {
  const a = arr.slice()
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1))
    ;[a[i], a[j]] = [a[j], a[i]]
  }
  return a
}

let ttsCache = {}
async function playTTS(text) {
  if (!text) return
  listenBtn.classList.add('is-loading')
  try {
    if (ttsCache[text]) {
      const a = new Audio(ttsCache[text])
      await a.play()
    } else {
      const res = await fetch('https://inglizi.com/api/tts', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ text, voice:'nova' }) })
      if (!res.ok) throw new Error('TTS failed')
      const blob = await res.blob()
      const url = URL.createObjectURL(blob)
      ttsCache[text] = url
      const a = new Audio(url)
      await a.play()
    }
  } catch (e) {
    // Fallback Web Speech
    try {
      const u = new SpeechSynthesisUtterance(text); u.lang = 'en-US'; window.speechSynthesis.speak(u)
    } catch (_) {}
  } finally {
    listenBtn.classList.remove('is-loading')
  }
}

function startLevel(level) {
  currentLevel = level
  pool = shuffle(ITEMS_BY_LEVEL[level])
  // keep round size to 12 for snappy play; level data is bigger so each play differs
  pool = pool.slice(0, 12)
  idx = 0
  score = 0; streak = 0
  scoreEl.textContent = '0'; streakEl.textContent = '0'
  summaryEl.classList.remove('is-shown')
  gameAreaEl.style.display = ''
  if (window.PlayProgress) PlayProgress.injectBestPill(document.getElementById('level-bar'), GAME_ID, currentLevel)
  loadQ()
}

function loadQ() {
  answered = false
  feedbackEl.textContent = ''; feedbackEl.className = 'feedback'
  nextBtn.style.display = 'none'
  setMascot('thinking')
  progressEl.style.width = ((idx / pool.length) * 100) + '%'

  if (idx >= pool.length) { finish(); return }
  const item = pool[idx]
  emojiEl.textContent = item.e

  // build distractors from same level
  const allWords = ITEMS_BY_LEVEL[currentLevel].map(x => x.w).filter(w => w !== item.w)
  const dists = shuffle(allWords).slice(0, 3)
  const opts = shuffle([{ w: item.w, correct: true }, ...dists.map(w => ({ w, correct: false }))])

  choicesEl.innerHTML = ''
  opts.forEach(o => {
    const b = document.createElement('button')
    b.className = 'choice'
    b.textContent = o.w
    b.addEventListener('click', () => pick(b, o.correct, o.w))
    choicesEl.appendChild(b)
  })
}

function pick(btn, correct, word) {
  if (answered) return
  answered = true
  const item = pool[idx]
  const allBtns = choicesEl.querySelectorAll('.choice')
  allBtns.forEach(b => b.disabled = true)
  if (correct) {
    btn.classList.add('is-correct')
    score++; streak++
    scoreEl.textContent = String(score); streakEl.textContent = String(streak)
    feedbackEl.textContent = `✓ Correct — ${item.w}`
    feedbackEl.className = 'feedback is-right'
    setMascot('happy', 'bounce')
    playTTS(item.w)
  } else {
    btn.classList.add('is-wrong')
    streak = 0; streakEl.textContent = '0'
    feedbackEl.textContent = `✗ Correct answer: "${item.w}"`
    feedbackEl.className = 'feedback is-wrong'
    setMascot('sad', 'shake')
    allBtns.forEach(b => { if (b.textContent === item.w) b.classList.add('is-correct') })
  }
  nextBtn.style.display = 'inline-flex'
}

function finish() {
  const prevBest = window.PlayProgress ? PlayProgress.getLevel(GAME_ID, currentLevel).best : 0
  const lv = window.PlayProgress ? PlayProgress.record(GAME_ID, currentLevel, score, pool.length) : { best: score }
  const acc = Math.round((score / pool.length) * 100)
  document.getElementById('final-score').textContent = `${score}/${pool.length}`
  document.getElementById('final-acc').textContent = acc + '%'
  document.getElementById('final-best').textContent = lv.best
  let trophy='🏆', title='Brilliant!', sub='ممتاز! أحسنت.'
  if (acc < 50) { trophy='💪'; title='Keep practicing'; sub='استمر! المرة القادمة أفضل.' }
  else if (acc < 80) { trophy='👍'; title='Good job'; sub='أداء جيد.' }
  document.getElementById('summary-trophy').textContent = trophy
  document.getElementById('summary-title').textContent = title
  document.getElementById('summary-sub').textContent = sub
  document.getElementById('new-best-banner').innerHTML = (score > prevBest && prevBest > 0) ? '<span class="new-best">🌟 New best!</span>' : ''
  gameAreaEl.style.display = 'none'
  summaryEl.classList.add('is-shown')
  if (window.PlayProgress) PlayProgress.injectBestPill(document.getElementById('level-bar'), GAME_ID, currentLevel)
}

listenBtn.addEventListener('click', () => {
  const item = pool[idx]
  if (item) playTTS(item.w)
})
nextBtn.addEventListener('click', () => { idx++; loadQ() })
document.getElementById('play-again-btn').addEventListener('click', () => startLevel(currentLevel))
document.querySelectorAll('.lev-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.lev-btn').forEach(b => b.classList.remove('is-active'))
    btn.classList.add('is-active')
    startLevel(btn.dataset.level)
  })
})

startLevel('A0')
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>Collocations — Play · Inglizi.com</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800;900&family=DM+Sans:wght@400;500;600;700;800;900&family=Cairo:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    button { font-family: inherit; cursor: pointer; }
    a { text-decoration: none; color: inherit; }
    :root {
      --ink:#1c1917; --ink-deep:#0c0a09;
      --bg:#f5efe0; --paper:#fdfaf0; --paper-soft:#faf3e0; --paper-deep:#f0e6cd;
      --border:#e0d4b2; --border-soft:#ece2c5;
      --gold:#b45309; --gold-bright:#d97706; --gold-soft:#fef3c7;
      --text:#1c1917; --text-2:#44403c; --text-muted:#78716c;
      --green:#15803d; --red:#b91c1c;
      --display:'Outfit','DM Sans',system-ui,sans-serif; --sans:'DM Sans',sans-serif;
      --arabic:'Cairo','Tajawal',sans-serif; --mono:'JetBrains Mono',ui-monospace,monospace;
    }
    html, body { background: var(--bg); color: var(--text); font-family: var(--sans); font-size: 16px; min-height: 100%; -webkit-font-smoothing: antialiased; }
    body::before { content: ""; position: fixed; inset: 0; pointer-events: none; z-index: 0; background: radial-gradient(ellipse 60% 40% at 80% 0%, rgba(180, 83, 9, 0.08), transparent 60%); }

    .topbar { position: sticky; top: 0; z-index: 100; background: rgba(245, 239, 224, 0.85); backdrop-filter: blur(18px) saturate(180%); border-bottom: 1px solid var(--border-soft); padding: 14px 24px; display: flex; align-items: center; justify-content: space-between; gap: 14px; flex-wrap: wrap; }
    .back-link { display: inline-flex; align-items: center; gap: 10px; padding: 8px 14px; border-radius: 999px; background: var(--paper); border: 1px solid var(--border); font-family: var(--display); font-size: 13px; font-weight: 700; color: var(--text-2); transition: all 0.18s ease; }
    .back-link:hover { background: var(--ink); color: white; border-color: var(--ink); }
    .game-title { font-family: var(--display); font-weight: 900; font-size: 18px; letter-spacing: -0.02em; display: flex; align-items: center; gap: 10px; }
    .scoreboard { display: flex; gap: 12px; font-family: var(--display); font-size: 11px; font-weight: 700; color: var(--text-muted); letter-spacing: 0.08em; text-transform: uppercase; }
    .scoreboard b { color: var(--ink); font-family: var(--mono); font-size: 16px; font-weight: 800; margin-left: 4px; }
    .scoreboard b.streak { color: var(--gold); }

    .page { position: relative; z-index: 2; max-width: 760px; margin: 0 auto; padding: 28px 24px 60px; }

    .mascot { filter: drop-shadow(0 6px 12px rgba(28, 25, 23, 0.25)); transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1); }
    .mascot.is-bounce { animation: bounce 0.5s ease; }
    @keyframes bounce { 50% { transform: translateY(-12px) rotate(-4deg); } }
    .mascot.is-shake { animation: shake-m 0.4s ease; }
    @keyframes shake-m { 25% { transform: translateX(-6px) rotate(-3deg); } 75% { transform: translateX(6px) rotate(3deg); } }

    .level-bar { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; margin-bottom: 22px; padding: 14px 18px; border-radius: 14px; background: var(--paper); border: 1px solid var(--border); }
    .level-bar-label { font-family: var(--display); font-size: 10px; font-weight: 800; color: var(--text-muted); letter-spacing: 0.18em; text-transform: uppercase; }
    .lev-btn { padding: 8px 14px; border-radius: 10px; background: transparent; border: 1.5px solid var(--border); font-family: var(--display); font-size: 12px; font-weight: 700; color: var(--text-2); transition: all 0.18s ease; }
    .lev-btn:hover { border-color: var(--gold); }
    .lev-btn.is-active { background: var(--ink); color: white; border-color: var(--ink); }
    .english-only { margin-left: auto; padding: 5px 12px; border-radius: 999px; background: var(--gold-soft); color: var(--gold); font-family: var(--display); font-size: 10px; font-weight: 800; letter-spacing: 0.18em; text-transform: uppercase; }

    .puzzle-card {
      position: relative;
      padding: 44px 36px 36px; border-radius: 24px;
      background: radial-gradient(ellipse 70% 50% at 100% 0%, rgba(217, 119, 6, 0.10), transparent 60%), linear-gradient(160deg, var(--paper), var(--paper-soft));
      border: 1px solid var(--border); margin-bottom: 22px;
      box-shadow: 0 16px 36px -14px rgba(115, 99, 53, 0.20);
      text-align: center;
    }
    .puzzle-card::before { content: ""; position: absolute; top: 0; left: 0; right: 0; height: 5px; background: linear-gradient(90deg, var(--ink), var(--gold), var(--gold-bright)); border-radius: 24px 24px 0 0; }
    .card-mascot { position: absolute; top: -26px; left: 30px; }
    .prompt-label { font-family: var(--display); font-size: 10px; font-weight: 800; color: var(--gold); letter-spacing: 0.22em; text-transform: uppercase; margin-bottom: 18px; }

    /* The two-part display: [blank] + base word */
    .collo-row {
      display: flex; align-items: center; justify-content: center; gap: 14px;
      flex-wrap: wrap; margin-bottom: 12px;
    }
    .collo-blank {
      min-width: 130px; padding: 14px 22px;
      border-radius: 14px; border: 3px dashed var(--gold);
      font-family: var(--display); font-size: clamp(20px, 3vw, 26px); font-weight: 900;
      color: var(--gold); background: rgba(254, 243, 199, 0.4);
    }
    .collo-blank.is-filled { border-style: solid; }
    .collo-plus { font-family: var(--display); font-size: 22px; font-weight: 900; color: var(--text-muted); }
    .collo-base {
      padding: 14px 22px;
      border-radius: 14px; border: 2px solid var(--border);
      background: var(--paper);
      font-family: var(--display); font-size: clamp(20px, 3vw, 26px); font-weight: 900;
      color: var(--ink); letter-spacing: -0.01em;
    }
    .puzzle-hint { margin-top: 14px; font-family: var(--display); font-size: 13px; color: var(--text-muted); font-weight: 600; }
    .puzzle-hint b { color: var(--ink); font-weight: 800; font-style: italic; }

    .choices { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 18px; }
    .choice {
      padding: 18px 18px; border-radius: 14px;
      background: var(--paper); border: 2px solid var(--border);
      font-family: var(--display); font-size: 17px; font-weight: 800;
      color: var(--text); text-align: center;
      transition: all 0.18s ease;
      letter-spacing: -0.005em;
    }
    .choice:hover:not(:disabled) { transform: translateY(-2px); border-color: var(--gold); color: var(--gold); }
    .choice.is-correct { background: rgba(21,128,61,0.12); border-color: var(--green); color: var(--green); }
    .choice.is-wrong { background: rgba(185,28,28,0.12); border-color: var(--red); color: var(--red); animation: shake-i 0.4s ease; }
    @keyframes shake-i { 25% { transform: translateX(-6px); } 75% { transform: translateX(6px); } }
    .choice:disabled { cursor: not-allowed; }

    .feedback { min-height: 26px; margin-bottom: 14px; padding: 0 4px; font-family: var(--display); font-size: 14px; font-weight: 700; text-align: center; }
    .feedback.is-right { color: var(--green); }
    .feedback.is-wrong { color: var(--red); }

    .explain { display: none; padding: 18px 22px; border-radius: 14px; background: var(--gold-soft); border: 1px solid rgba(180,83,9,0.2); margin-bottom: 14px; }
    .explain.is-shown { display: block; }
    .explain-label { font-family: var(--display); font-size: 10px; font-weight: 800; color: var(--gold); letter-spacing: 0.18em; text-transform: uppercase; margin-bottom: 8px; }
    .explain-eg { font-family: var(--display); font-size: 14.5px; color: var(--text); font-weight: 600; font-style: italic; line-height: 1.55; margin-bottom: 6px; }
    .explain-eg em { color: var(--gold); font-style: normal; font-weight: 800; }
    .explain-note { font-family: var(--display); font-size: 13px; color: var(--text-2); font-weight: 600; line-height: 1.55; }

    .actions { display: flex; gap: 12px; flex-wrap: wrap; justify-content: center; }
    .btn { display: inline-flex; align-items: center; gap: 10px; padding: 14px 26px; border-radius: 12px; font-family: var(--display); font-size: 14px; font-weight: 800; transition: all 0.18s ease; border: none; }
    .btn.is-gold { background: linear-gradient(135deg, var(--gold), var(--gold-bright)); color: white; box-shadow: 0 8px 18px -5px rgba(180, 83, 9, 0.35); }
    .btn.is-gold:hover { transform: translateY(-2px); }

    @media (max-width: 640px) {
      .topbar { padding: 12px 16px; }
      .page { padding: 22px 14px; }
      .puzzle-card { padding: 36px 22px 26px; }
      .card-mascot { left: 50%; transform: translateX(-50%); top: -32px; }
      .choices { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<nav class="topbar">
  <a href="../../" class="back-link">← All games</a>
  <div class="game-title">🔗 Collocations</div>
  <div class="scoreboard">
    <span>Score<b id="score">0</b></span>
    <span>Streak<b class="streak" id="streak">0</b></span>
  </div>
</nav>

<main class="page">

  <div class="level-bar">
    <span class="level-bar-label">Level</span>
    <button class="lev-btn is-active" data-level="B1">B1 · Intermediate</button>
    <button class="lev-btn" data-level="B2">B2 · Upper-Int</button>
    <button class="lev-btn" data-level="C1">C1 · Advanced</button>
    <span class="english-only">English only</span>
  </div>

  <div class="puzzle-card">
    <div class="card-mascot">
      <svg width="68" height="82" viewBox="0 0 100 120" class="mascot" id="mascot"></svg>
    </div>
    <div class="prompt-label">Which word naturally pairs?</div>
    <div class="collo-row">
      <div class="collo-blank" id="blank">???</div>
      <span class="collo-plus">+</span>
      <div class="collo-base" id="base">decision</div>
    </div>
    <div class="puzzle-hint">Pick the word that <b>native speakers</b> always use with this noun.</div>
  </div>

  <div class="choices" id="choices"></div>

  <div class="explain" id="explain">
    <div class="explain-label">💡 Why this pair?</div>
    <div class="explain-eg" id="explain-eg"></div>
    <div class="explain-note" id="explain-note"></div>
  </div>

  <div class="feedback" id="feedback"></div>

  <div class="actions">
    <button class="btn is-gold" id="next-btn" style="display:none;">Next pair →</button>
  </div>

</main>

<script>
function mascotSVG(mood) {
  const EYES = {
    default:'<circle cx="38" cy="58" r="6" fill="#fdfaf0"/><circle cx="62" cy="58" r="6" fill="#fdfaf0"/><circle cx="38" cy="59" r="3" fill="#1c1917"/><circle cx="62" cy="59" r="3" fill="#1c1917"/><circle cx="39" cy="57" r="1" fill="#fdfaf0"/><circle cx="63" cy="57" r="1" fill="#fdfaf0"/>',
    happy:'<path d="M 32 60 Q 38 53 44 60" stroke="#fdfaf0" stroke-width="2.5" fill="none" stroke-linecap="round"/><path d="M 56 60 Q 62 53 68 60" stroke="#fdfaf0" stroke-width="2.5" fill="none" stroke-linecap="round"/>',
    sad:'<circle cx="38" cy="60" r="6" fill="#fdfaf0"/><circle cx="62" cy="60" r="6" fill="#fdfaf0"/><circle cx="38" cy="62" r="3" fill="#1c1917"/><circle cx="62" cy="62" r="3" fill="#1c1917"/>',
    thinking:'<circle cx="38" cy="58" r="6" fill="#fdfaf0"/><circle cx="62" cy="58" r="6" fill="#fdfaf0"/><circle cx="40" cy="55" r="3" fill="#1c1917"/><circle cx="64" cy="55" r="3" fill="#1c1917"/>'
  }
  const MOUTHS = {
    default:'<path d="M 40 75 Q 50 80 60 75" stroke="#fdfaf0" stroke-width="2.5" fill="none" stroke-linecap="round"/>',
    happy:'<path d="M 32 72 Q 50 88 68 72 Q 50 80 32 72 Z" fill="#fdfaf0"/>',
    sad:'<path d="M 40 80 Q 50 73 60 80" stroke="#fdfaf0" stroke-width="2.5" fill="none" stroke-linecap="round"/>',
    thinking:'<path d="M 42 78 L 58 78" stroke="#fdfaf0" stroke-width="2.5" stroke-linecap="round"/>'
  }
  const m = mood || 'default'
  return `<line x1="50" y1="14" x2="74" y2="6" stroke="#fbbf24" stroke-width="2"/><circle cx="74" cy="6" r="3" fill="#fbbf24"/><rect x="32" y="12" width="36" height="14" rx="3" fill="#d97706"/><rect x="14" y="24" width="72" height="6" rx="2" fill="#b45309"/><circle cx="50" cy="62" r="34" fill="#1c1917"/><path d="M 18 112 Q 50 92 82 112 L 82 120 L 18 120 Z" fill="#1c1917"/>${EYES[m]||EYES.default}${MOUTHS[m]||MOUTHS.default}`
}
function setMascot(mood, bounce) {
  const el = document.getElementById('mascot')
  el.innerHTML = mascotSVG(mood)
  if (bounce) { el.classList.remove('is-bounce','is-shake'); void el.offsetWidth; el.classList.add(bounce === 'shake' ? 'is-shake' : 'is-bounce') }
}

// { answer, base, distractors:[3], eg, note }
const QS_BY_LEVEL = {
  B1: [
    { answer:'make', base:'a decision', distractors:['do','take','have'], eg:'You need to <em>make a decision</em> by tomorrow.', note:'In English we say <em>make</em> a decision, never "do" or "take" a decision.' },
    { answer:'take', base:'a shower', distractors:['make','do','have'], eg:'I always <em>take a shower</em> before bed.', note:'British speakers often say <em>have a shower</em>; American: <em>take a shower</em>.' },
    { answer:'do', base:'homework', distractors:['make','take','play'], eg:'Did you <em>do your homework</em>?', note:'We <em>do</em> homework — not "make" homework.' },
    { answer:'catch', base:'a cold', distractors:['take','get','hold'], eg:'He <em>caught a cold</em> last week.', note:'<em>Catch a cold</em> = become ill with a cold.' },
    { answer:'pay', base:'attention', distractors:['give','do','make'], eg:'Please <em>pay attention</em> in class.', note:'<em>Pay attention</em> is fixed — "give attention" sounds odd.' },
    { answer:'tell', base:'the truth', distractors:['say','speak','talk'], eg:'Just <em>tell the truth</em> — they will understand.', note:'<em>Tell the truth / a lie / a story / a joke</em>.' },
    { answer:'take', base:'a photo', distractors:['make','do','get'], eg:'Can you <em>take a photo</em> of us?', note:'We <em>take</em> photos in English (not "make" them).' },
    { answer:'make', base:'a mistake', distractors:['do','take','get'], eg:'Everyone <em>makes mistakes</em>.', note:'<em>Make a mistake</em> is fixed — never "do a mistake".' },
    { answer:'have', base:'breakfast', distractors:['make','do','take'], eg:'I usually <em>have breakfast</em> at 8.', note:'<em>Have</em> + meal: have breakfast / lunch / dinner.' },
    { answer:'do', base:'the dishes', distractors:['make','take','have'], eg:'I’ll cook if you <em>do the dishes</em>.', note:'<em>Do the dishes / the laundry / the shopping</em> — household chores use <em>do</em>.' },
    { answer:'miss', base:'the bus', distractors:['lose','fail','skip'], eg:'I had to walk because I <em>missed the bus</em>.', note:'<em>Miss</em> (not "lose") the bus, the train, the flight.' },
    { answer:'save', base:'time', distractors:['win','make','hold'], eg:'Online shopping <em>saves time</em>.', note:'<em>Save time / money / energy</em> — not "win" or "earn".' },
  ],
  B2: [
    { answer:'heavy', base:'rain', distractors:['strong','big','hard'], eg:'There was <em>heavy rain</em> all night.', note:'<em>Heavy rain / snow / traffic</em> — never "strong rain".' },
    { answer:'strong', base:'coffee', distractors:['heavy','big','high'], eg:'I need a <em>strong coffee</em> to wake up.', note:'<em>Strong</em> (not "heavy") for coffee, tea, smell, wind.' },
    { answer:'highly', base:'recommended', distractors:['strongly','heavily','deeply'], eg:'This restaurant is <em>highly recommended</em>.', note:'<em>Highly</em> + recommended / qualified / unlikely.' },
    { answer:'strongly', base:'agree', distractors:['highly','deeply','heavily'], eg:'I <em>strongly agree</em> with that idea.', note:'<em>Strongly</em> + agree / disagree / believe / suggest.' },
    { answer:'deeply', base:'in love', distractors:['highly','heavily','strongly'], eg:'They are <em>deeply in love</em>.', note:'<em>Deeply</em> + emotion: in love, sad, sorry, concerned.' },
    { answer:'fast', base:'food', distractors:['quick','rapid','speedy'], eg:'Try not to eat <em>fast food</em> every day.', note:'It’s <em>fast food</em>, not "quick food" — a fixed compound.' },
    { answer:'quick', base:'shower', distractors:['fast','rapid','speedy'], eg:'I’ll just have a <em>quick shower</em>.', note:'<em>Quick</em> shower / break / lunch — short duration activities.' },
    { answer:'major', base:'role', distractors:['big','large','great'], eg:'She plays a <em>major role</em> in the project.', note:'<em>Major</em> + role / problem / change / impact (formal).' },
    { answer:'wide', base:'range', distractors:['big','large','broad'], eg:'We offer a <em>wide range</em> of services.', note:'<em>Wide</em> range / variety / choice — not "big".' },
    { answer:'narrow', base:'escape', distractors:['close','small','tight'], eg:'It was a <em>narrow escape</em> — the car almost hit us!', note:'<em>Narrow escape</em> = just barely avoided danger.' },
    { answer:'raise', base:'awareness', distractors:['rise','grow','lift'], eg:'The campaign aims to <em>raise awareness</em> of climate change.', note:'<em>Raise awareness / money / a question</em> — transitive (needs object).' },
    { answer:'meet', base:'a deadline', distractors:['catch','reach','hit'], eg:'Can we <em>meet the deadline</em> for Friday?', note:'<em>Meet a deadline</em> = finish on time. Also: meet a target / requirement.' },
  ],
  C1: [
    { answer:'utterly', base:'ridiculous', distractors:['highly','deeply','strongly'], eg:'That accusation is <em>utterly ridiculous</em>.', note:'<em>Utterly</em> intensifies negative adjectives: ridiculous / appalled / exhausted.' },
    { answer:'bitterly', base:'disappointed', distractors:['highly','utterly','heavily'], eg:'She was <em>bitterly disappointed</em> by the result.', note:'<em>Bitterly</em> + disappointed / cold / regret / oppose.' },
    { answer:'sweeping', base:'changes', distractors:['heavy','wide','major'], eg:'The new CEO introduced <em>sweeping changes</em>.', note:'<em>Sweeping</em> changes / reforms / generalisations — far-reaching, broad.' },
    { answer:'tentative', base:'agreement', distractors:['light','small','soft'], eg:'They reached a <em>tentative agreement</em>.', note:'<em>Tentative</em> = not yet definite. Often pairs with agreement / plan / offer.' },
    { answer:'staunch', base:'supporter', distractors:['strong','firm','solid'], eg:'He is a <em>staunch supporter</em> of free speech.', note:'<em>Staunch</em> = loyal and committed. Use with supporter / ally / defender.' },
    { answer:'glaring', base:'omission', distractors:['big','huge','sharp'], eg:'The report contains a <em>glaring omission</em>.', note:'<em>Glaring</em> = very obvious (usually negative): omission / error / inequality.' },
    { answer:'pose', base:'a threat', distractors:['make','give','place'], eg:'Climate change <em>poses a threat</em> to coastal cities.', note:'<em>Pose</em> + threat / problem / risk / challenge / question (formal).' },
    { answer:'draw', base:'a conclusion', distractors:['make','take','get'], eg:'It’s too early to <em>draw a conclusion</em>.', note:'<em>Draw</em> a conclusion / comparison / parallel / distinction.' },
    { answer:'level', base:'criticism', distractors:['give','make','put'], eg:'Strong criticism was <em>levelled</em> at the government.', note:'<em>Level criticism / accusations / charges</em> at someone (formal).' },
    { answer:'vested', base:'interest', distractors:['fixed','strong','deep'], eg:'He has a <em>vested interest</em> in the outcome.', note:'<em>Vested interest</em> = personal stake. Fixed phrase.' },
    { answer:'mounting', base:'pressure', distractors:['rising','growing','heavy'], eg:'There is <em>mounting pressure</em> to resign.', note:'<em>Mounting</em> pressure / evidence / tension / debt — increasing steadily.' },
    { answer:'sweeping', base:'statement', distractors:['big','large','wide'], eg:'That’s a <em>sweeping statement</em> — not all teens are like that.', note:'<em>Sweeping statement / generalisation</em> = too general, often unfair.' },
  ],
}

let currentLevel = 'B1'
let pool = []
let idx = 0
let score = 0, streak = 0
let answered = false

const blankEl = document.getElementById('blank')
const baseEl = document.getElementById('base')
const choicesEl = document.getElementById('choices')
const explainEl = document.getElementById('explain')
const explainEg = document.getElementById('explain-eg')
const explainNote = document.getElementById('explain-note')
const feedbackEl = document.getElementById('feedback')
const scoreEl = document.getElementById('score')
const streakEl = document.getElementById('streak')
const nextBtn = document.getElementById('next-btn')

function shuffle(arr) {
  const a = arr.slice()
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1))
    ;[a[i], a[j]] = [a[j], a[i]]
  }
  return a
}

function startLevel(level) {
  currentLevel = level
  pool = shuffle(QS_BY_LEVEL[level])
  idx = 0
  score = 0; streak = 0
  scoreEl.textContent = '0'; streakEl.textContent = '0'
  loadQ()
}

function loadQ() {
  answered = false
  feedbackEl.textContent = ''; feedbackEl.className = 'feedback'
  explainEl.classList.remove('is-shown')
  nextBtn.style.display = 'none'
  setMascot('thinking')

  if (idx >= pool.length) {
    pool = shuffle(QS_BY_LEVEL[currentLevel])
    idx = 0
  }
  const q = pool[idx]
  blankEl.textContent = '???'
  blankEl.classList.remove('is-filled')
  baseEl.textContent = q.base

  const opts = shuffle([
    { text: q.answer, correct: true },
    ...q.distractors.map(d => ({ text: d, correct: false })),
  ])
  choicesEl.innerHTML = ''
  opts.forEach(o => {
    const b = document.createElement('button')
    b.className = 'choice'
    b.textContent = o.text
    b.addEventListener('click', () => pick(b, o.correct, o.text))
    choicesEl.appendChild(b)
  })
}

function pick(btn, correct, picked) {
  if (answered) return
  answered = true
  const q = pool[idx]
  const allBtns = choicesEl.querySelectorAll('.choice')
  allBtns.forEach(b => b.disabled = true)
  blankEl.textContent = picked
  blankEl.classList.add('is-filled')

  if (correct) {
    btn.classList.add('is-correct')
    score++; streak++
    scoreEl.textContent = String(score); streakEl.textContent = String(streak)
    feedbackEl.textContent = '✓ Natural pairing!'
    feedbackEl.className = 'feedback is-right'
    setMascot('happy', 'bounce')
  } else {
    btn.classList.add('is-wrong')
    streak = 0
    streakEl.textContent = '0'
    feedbackEl.textContent = `✗ Native speakers say "${q.answer}"`
    feedbackEl.className = 'feedback is-wrong'
    setMascot('sad', 'shake')
    allBtns.forEach(b => { if (b.textContent === q.answer) b.classList.add('is-correct') })
    blankEl.textContent = q.answer
  }
  explainEg.innerHTML = q.eg
  explainNote.innerHTML = q.note
  explainEl.classList.add('is-shown')
  nextBtn.style.display = 'inline-flex'
}

nextBtn.addEventListener('click', () => { idx++; loadQ() })

document.querySelectorAll('.lev-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.lev-btn').forEach(b => b.classList.remove('is-active'))
    btn.classList.add('is-active')
    startLevel(btn.dataset.level)
  })
})

startLevel('B1')
</script>

</body>
</html>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; } button { font-family: inherit; cursor: pointer; } a { text-decoration: none; color: inherit; }

    .back-link { display: inline-flex; align-items: center; gap: 10px; padding: 8px 14px; border-radius: 999px; background: var(--paper); border: 1px solid var(--border); font-family: var(--display); font-size: 13px; font-weight: 700; color: var(--text-2); } .back-link:hover { background: var(--ink); color: white; border-color: var(--ink); }
    .game-title { font-family: var(--display); font-weight: 900; font-size: 18px; }

    .page { position: relative; z-index: 2; max-width: 760px; margin: 0 auto; padding: 28px 24px 60px; }
    .mascot { filter: drop-shadow(0 6px 12px rgba(28, 25, 23, 0.25)); } .mascot.is-bounce { animation: bounce 0.5s ease; } @keyframes bounce { 50% { transform: translateY(-12px) rotate(-4deg); } } .mascot.is-shake { animation: shake-m 0.4s ease; } @keyframes shake-m { 25% { transform: translateX(-6px) rotate(-3deg); } 75% { transform: translateX(6px) rotate(3deg); } }

    .riddle-card::before { content: ""; position: absolute; top: 0; left: 0; right: 0; height: 5px; background: linear-gradient(90deg, var(--ink), var(--gold), var(--gold-bright)); border-radius: 24px 24px 0 0; } .card-mascot { position: absolute; top: -26px; left: 28px; }
    .riddle-label { font-family: var(--display); font-size: 10px; font-weight: 800; color: var(--gold); letter-spacing: 0.22em; text-transform: uppercase; margin-bottom: 16px; text-align: center; }

    .choice { padding: 16px; border-radius: 14px; background: var(--paper); border: 2px solid var(--border); font-family: var(--display); font-size: 16px; font-weight: 800; color: var(--text); text-align: center; transition: all 0.18s ease; }
    .choice:hover:not(:disabled) { transform: translateY(-2px); border-color: var(--gold); color: var(--gold); } .choice.is-correct { background: rgba(21,128,61,0.12); border-color: var(--green); color: var(--green); } .choice.is-wrong { background: rgba(185,28,28,0.12); border-color: var(--red); color: var(--red); animation: shake-i 0.4s ease; } @keyframes shake-i { 25% { transform: translateX(-6px); } 75% { transform: translateX(6px); } }

    @media (max-width: 640px) { .topbar { padding: 12px 16px; } .page { padding: 22px 14px; } .card-mascot { left: 50%; transform: translateX(-50%); top: -32px; } }

<script>
const GAME_ID='riddle-me'
function mascotSVG(m){const E={default:'<circle cx="38" cy="58" r="6" fill="#fdfaf0"/><circle cx="62" cy="58" r="6" fill="#fdfaf0"/><circle cx="38" cy="59" r="3" fill="#1c1917"/><circle cx="62" cy="59" r="3" fill="#1c1917"/><circle cx="39" cy="57" r="1" fill="#fdfaf0"/><circle cx="63" cy="57" r="1" fill="#fdfaf0"/>',happy:'<path d="M 32 60 Q 38 53 44 60" stroke="#fdfaf0" stroke-width="2.5" fill="none" stroke-linecap="round"/><path d="M 56 60 Q 62 53 68 60" stroke="#fdfaf0" stroke-width="2.5" fill="none" stroke-linecap="round"/>',sad:'<circle cx="38" cy="60" r="6" fill="#fdfaf0"/><circle cx="62" cy="60" r="6" fill="#fdfaf0"/><circle cx="38" cy="62" r="3" fill="#1c1917"/><circle cx="62" cy="62" r="3" fill="#1c1917"/>',thinking:'<circle cx="38" cy="58" r="6" fill="#fdfaf0"/><circle cx="62" cy="58" r="6" fill="#fdfaf0"/><circle cx="40" cy="55" r="3" fill="#1c1917"/><circle cx="64" cy="55" r="3" fill="#1c1917"/>'};const M={default:'<path d="M 40 75 Q 50 80 60 75" stroke="#fdfaf0" stroke-width="2.5" fill="none" stroke-linecap="round"/>',happy:'<path d="M 32 72 Q 50 88 68 72 Q 50 80 32 72 Z" fill="#fdfaf0"/>',sad:'<path d="M 40 80 Q 50 73 60 80" stroke="#fdfaf0" stroke-width="2.5" fill="none" stroke-linecap="round"/>',thinking:'<path d="M 42 78 L 58 78" stroke="#fdfaf0" stroke-width="2.5" stroke-linecap="round"/>'};const x=m||'default';return `<line x1="50" y1="14" x2="74" y2="6" stroke="#fbbf24" stroke-width="2"/><circle cx="74" cy="6" r="3" fill="#fbbf24"/><rect x="32" y="12" width="36" height="14" rx="3" fill="#d97706"/><rect x="14" y="24" width="72" height="6" rx="2" fill="#b45309"/><circle cx="50" cy="62" r="34" fill="#1c1917"/><path d="M 18 112 Q 50 92 82 112 L 82 120 L 18 120 Z" fill="#1c1917"/>${E[x]||E.default}${M[x]||M.default}`}
function setMascot(m,b){const el=document.getElementById('mascot');el.innerHTML=mascotSVG(m);if(b){el.classList.remove('is-bounce','is-shake');void el.offsetWidth;el.classList.add(b==='shake'?'is-shake':'is-bounce')}}

// {clues: ['line 1','line 2',...], a: 'answer', distractors: [3]}
const RIDDLES = {
  A2: [
    {clues:['I have wings.','I lay eggs.','I can fly high in the sky.','I make a "tweet" sound.'], a:'bird', distractors:['cat','fish','snake']},
    {clues:['I am hot during the day.','I light up the world.','I disappear at night.','Plants need me to grow.'], a:'the sun', distractors:['the moon','a star','fire']},
    {clues:['I have four legs.','I bark.','I am man\'s best friend.','I wag my tail when happy.'], a:'dog', distractors:['cat','horse','rabbit']},
    {clues:['I am white inside.','I am yellow on top.','You can fry me or boil me.','I come from a hen.'], a:'egg', distractors:['cheese','milk','apple']},
    {clues:['I am cold.','I am made of water.','You can find me in the freezer.','I melt in the sun.'], a:'ice', distractors:['snow','glass','metal']},
    {clues:['I have hands but no arms.','I have a face but no eyes.','I tick all day.','You wear me on your wrist.'], a:'a watch', distractors:['a glove','a ring','a phone']},
    {clues:['I am tall.','I have leaves.','Birds make nests in me.','You can climb me.'], a:'a tree', distractors:['a wall','a ladder','a tower']},
    {clues:['I am yellow and curved.','Monkeys love me.','I have a peel.','I am a fruit.'], a:'banana', distractors:['lemon','orange','mango']},
    {clues:['I keep your feet warm.','You wear me on your feet.','I am usually soft and stretchy.','I come in pairs.'], a:'socks', distractors:['shoes','gloves','hat']},
    {clues:['I have keys but no doors.','I have spaces but no rooms.','You can press me but I am not a button.','You use me to type.'], a:'a keyboard', distractors:['a piano','a lock','a car']},
    {clues:['I shine at night.','I change my shape.','I am round when full.','Astronauts have walked on me.'], a:'the moon', distractors:['the sun','a star','a planet']},
    {clues:['I am made of paper.','I have many pages.','You read me.','I tell stories.'], a:'a book', distractors:['a magazine','a poster','a letter']},
    {clues:['I have a mouth but I cannot eat.','I have a bed but I never sleep.','I flow but never get tired.','I am full of fish.'], a:'a river', distractors:['the sea','a lake','a pond']},
    {clues:['I have many teeth.','But I never bite.','You hold me in your hand.','I help fix your hair.'], a:'a comb', distractors:['a brush','a fork','a saw']},
    {clues:['I am square.','You sit on me.','I have four legs.','I am usually wooden.'], a:'a chair', distractors:['a table','a desk','a sofa']},
  ],
  B1: [
    {clues:['The more you take, the more you leave behind.','I am invisible.','You walk on me as you go.','I record where you have been.'], a:'footsteps', distractors:['shadow','wind','time']},
    {clues:['I have cities, but no houses.','I have mountains, but no trees.','I have water, but no fish.','You can fold me.'], a:'a map', distractors:['a globe','a painting','a book']},
    {clues:['I run but never walk.','I have a bed but I do not sleep.','I have a mouth but cannot speak.','I always carry water.'], a:'a river', distractors:['a stream','a pipe','an ocean']},
    {clues:['I have a neck but no head.','I have a body but no arms.','You can fill me up.','I hold liquid.'], a:'a bottle', distractors:['a glass','a vase','a cup']},
    {clues:['The more there is of me, the less you see.','I disappear when light arrives.','I cover everything at night.','I hide secrets.'], a:'darkness', distractors:['fog','shadow','smoke']},
    {clues:['I have eyes but cannot see.','I am long and thin.','You sew with me.','I have a sharp point.'], a:'a needle', distractors:['a pin','a knife','a pen']},
    {clues:['I belong to you, but other people use me more than you do.','It identifies you.','It is the first thing parents give you.','It is on your ID card.'], a:'your name', distractors:['your photo','your shadow','your phone']},
    {clues:['I get wetter the more I dry.','I am made of cloth.','You use me after a shower.','I hang in the bathroom.'], a:'a towel', distractors:['a sponge','a napkin','a tissue']},
    {clues:['I have many keys but cannot open any lock.','I make beautiful sounds.','I have black and white parts.','You press me to play music.'], a:'a piano', distractors:['a guitar','a typewriter','a violin']},
    {clues:['What goes up but never comes down?','I increase every year.','Birthdays make me grow.','You cannot decrease me.'], a:'your age', distractors:['height','weight','price']},
    {clues:['I am full of holes but I hold water.','I am soft.','You squeeze me to clean.','I live in the ocean too.'], a:'a sponge', distractors:['a cloud','a balloon','a net']},
    {clues:['I am light as a feather, but the strongest person cannot hold me for long.','You do me constantly.','Without me you die.','Hold me too long and you suffocate.'], a:'breath', distractors:['thought','heartbeat','wind']},
    {clues:['I have a head and a tail but no body.','I am made of metal.','You can flip me.','Two sides decide my fate.'], a:'a coin', distractors:['a fish','a snake','a dart']},
    {clues:['I have one eye but cannot see.','I am sharp.','I make holes in fabric.','You sew with me.'], a:'a needle', distractors:['a hook','a pin','a knife']},
    {clues:['I have branches but no leaves.','I have no trunk and no roots.','You can find me in a library.','I have departments.'], a:'a bank', distractors:['a hospital','a school','a museum']},
  ],
  B2: [
    {clues:['I speak without a mouth.','I hear without ears.','I have no body.','I come alive with the wind.'], a:'an echo', distractors:['a shadow','a thought','a ghost']},
    {clues:['I am always coming but never arrive.','I am known but never seen.','You can plan for me.','I always lie ahead.'], a:'tomorrow', distractors:['the future','time','death']},
    {clues:['You cannot keep me until you have given me.','I open conversations.','I leave a lasting impression.','I am free to give.'], a:'a smile', distractors:['a promise','a kiss','laughter']},
    {clues:['I am taken before you can see me.','I am made of light and shadow.','You frame me.','I capture a moment.'], a:'a photograph', distractors:['a memory','a painting','a dream']},
    {clues:['I have no beginning, no end, and no middle.','I am perfectly round.','I represent eternity.','I have no corners.'], a:'a circle', distractors:['a sphere','a wheel','a coin']},
    {clues:['Forward I am heavy, but backward I am not.','My letters reverse meaning.','I am a five-letter word.','In reverse I weigh less.'], a:'a ton', distractors:['a pound','a stone','a brick']},
    {clues:['I have a thousand needles but cannot sew.','I am green all year.','You decorate me in winter.','I smell fresh and sharp.'], a:'a pine tree', distractors:['a cactus','a porcupine','a needlefish']},
    {clues:['I belong to no one yet I am the cause of many fights.','Nations spill blood over me.','Lines on a map define me.','I can be lost or won.'], a:'territory', distractors:['power','gold','pride']},
    {clues:['I am bought to be eaten, but I am never eaten myself.','I cradle food.','I am thrown away when empty.','I come in many shapes.'], a:'a plate', distractors:['a bowl','a basket','a box']},
    {clues:['I increase the more I am shared.','I have no value if hoarded.','Teachers spread me.','Books are full of me.'], a:'knowledge', distractors:['love','time','happiness']},
    {clues:['I have countries but no people.','I have rivers but no water.','I have forests but no trees.','You unfold me.'], a:'a map', distractors:['a book','a globe','a chart']},
    {clues:['I am older than the dinosaurs.','I cover most of Earth.','I take many forms.','Life began in me.'], a:'water', distractors:['rocks','air','soil']},
    {clues:['I have no weight, but a strong person can break me with a whisper.','I am priceless and fragile.','You give me with trust.','I cannot be repaired with apologies alone.'], a:'a promise', distractors:['trust','silence','a vase']},
    {clues:['I follow you all day but vanish at night.','I cannot speak.','I copy your every move.','Sun gives me birth.'], a:'a shadow', distractors:['a reflection','an echo','a thought']},
    {clues:['I am free to receive but very expensive to keep.','I cost millions.','I move at lightning speed.','Without me you have no message.'], a:'an idea', distractors:['a secret','a memory','attention']},
  ],
}

let currentLevel='A2',pool=[],idx=0,score=0,streak=0,answered=false
const riddleEl=document.getElementById('riddle'),choicesEl=document.getElementById('choices'),feedbackEl=document.getElementById('feedback'),scoreEl=document.getElementById('score'),streakEl=document.getElementById('streak'),nextBtn=document.getElementById('next-btn'),progressEl=document.getElementById('progress'),gameAreaEl=document.getElementById('game-area'),summaryEl=document.getElementById('summary')
function shuffle(a){a=a.slice();for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a}
function startLevel(lv){currentLevel=lv;pool=shuffle(RIDDLES[lv]).slice(0,10);idx=0;score=0;streak=0;scoreEl.textContent='0';streakEl.textContent='0';summaryEl.classList.remove('is-shown');gameAreaEl.style.display='';if(window.PlayProgress)PlayProgress.injectBestPill(document.getElementById('level-bar'),GAME_ID,currentLevel);loadQ()}
function loadQ(){answered=false;feedbackEl.textContent='';feedbackEl.className='feedback';nextBtn.style.display='none';setMascot('thinking');progressEl.style.width=((idx/pool.length)*100)+'%';if(idx>=pool.length){finish();return}
  const r=pool[idx]
  riddleEl.innerHTML=r.clues.map((l,i)=>`<div>${i+1}. <em>${l}</em></div>`).join('')
  const opts=shuffle([{w:r.a,c:true},...r.distractors.map(w=>({w,c:false}))])
  choicesEl.innerHTML=''
  opts.forEach(o=>{const b=document.createElement('button');b.className='choice';b.textContent=o.w;b.addEventListener('click',()=>pick(b,o.c));choicesEl.appendChild(b)})
}
function pick(btn,correct){if(answered)return;answered=true;const r=pool[idx];const all=choicesEl.querySelectorAll('.choice');all.forEach(b=>b.disabled=true)
  if(correct){btn.classList.add('is-correct');score++;streak++;scoreEl.textContent=score;streakEl.textContent=streak;feedbackEl.textContent=`✓ Correct! It was "${r.a}".`;feedbackEl.className='feedback is-right';setMascot('happy','bounce')}
  else{btn.classList.add('is-wrong');streak=0;streakEl.textContent='0';all.forEach(b=>{if(b.textContent===r.a)b.classList.add('is-correct')});feedbackEl.textContent=`✗ The answer was "${r.a}"`;feedbackEl.className='feedback is-wrong';setMascot('sad','shake')}
  nextBtn.style.display='inline-flex'
}
function finish(){const prevBest=window.PlayProgress?PlayProgress.getLevel(GAME_ID,currentLevel).best:0;const lv=window.PlayProgress?PlayProgress.record(GAME_ID,currentLevel,score,pool.length):{best:score};const acc=Math.round((score/pool.length)*100);document.getElementById('final-score').textContent=`${score}/${pool.length}`;document.getElementById('final-acc').textContent=acc+'%';document.getElementById('final-best').textContent=lv.best;let t='🏆',ti='Brilliant!',su='ممتاز!';if(acc<50){t='💪';ti='Keep practicing';su='استمر!'}else if(acc<80){t='👍';ti='Good job';su='أداء جيد.'}document.getElementById('summary-trophy').textContent=t;document.getElementById('summary-title').textContent=ti;document.getElementById('summary-sub').textContent=su;document.getElementById('new-best-banner').innerHTML=(score>prevBest&&prevBest>0)?'<span class="new-best">🌟 New best!</span>':'';gameAreaEl.style.display='none';summaryEl.classList.add('is-shown');if(window.PlayProgress)PlayProgress.injectBestPill(document.getElementById('level-bar'),GAME_ID,currentLevel)}
nextBtn.addEventListener('click',()=>{idx++;loadQ()})
document.getElementById('play-again-btn').addEventListener('click',()=>startLevel(currentLevel))
document.querySelectorAll('.lev-btn').forEach(b=>b.addEventListener('click',()=>{document.querySelectorAll('.lev-btn').forEach(x=>x.classList.remove('is-active'));b.classList.add('is-active');startLevel(b.dataset.level)}))
startLevel('A2')
</script>

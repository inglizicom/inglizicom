    .scoreboard{display:flex;gap:14px;font-family:var(--arcade);font-size:13px;color:var(--text-muted);letter-spacing:.08em;align-items:center}
    .scoreboard b{color:var(--gold);font-size:18px;margin-left:6px}
    .page{position:relative;z-index:2;max-width:1100px;margin:0 auto;padding:28px 24px 60px}

    .layout{display:grid;grid-template-columns:1fr 1fr;gap:24px;align-items:start}
    @media (max-width:880px){.layout{grid-template-columns:1fr}}
    .wheel-side{position:relative;display:flex;flex-direction:column;align-items:center;gap:18px}
    .wheel-container{position:relative;width:100%;max-width:440px;aspect-ratio:1/1}
    .wheel-pointer{position:absolute;top:-6px;left:50%;transform:translateX(-50%);z-index:10;width:0;height:0;border-left:18px solid transparent;border-right:18px solid transparent;border-top:32px solid var(--gold);filter:drop-shadow(0 4px 8px rgba(0,0,0,.5))}
    .wheel{width:100%;height:100%;border-radius:50%;border:8px solid var(--gold);box-shadow:0 0 40px -8px rgba(251,191,36,.5),0 0 0 4px var(--ink),0 0 0 8px var(--gold);transition:transform 4s cubic-bezier(.17,.67,.16,1)}
    .wheel-hub{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:80px;height:80px;border-radius:50%;background:radial-gradient(circle at 35% 35%,var(--gold-2),#b45309);border:4px solid var(--ink);box-shadow:0 4px 12px rgba(0,0,0,.5);display:flex;align-items:center;justify-content:center;z-index:5;font-family:var(--arcade);font-size:10px;color:var(--ink);letter-spacing:.1em;text-align:center;line-height:1.2}
    .spin-btn{padding:18px 36px;border-radius:14px;background:linear-gradient(135deg,var(--gold),var(--gold-2));color:var(--ink);font-family:var(--display);font-size:20px;font-weight:900;letter-spacing:.02em;border:none;cursor:pointer;box-shadow:0 10px 24px -6px rgba(251,191,36,.5);transition:all .18s ease}
    .spin-btn:hover:not(:disabled){transform:translateY(-3px)}
    .spin-btn:disabled{opacity:.5;cursor:wait}

    .quiz-side{display:flex;flex-direction:column;gap:14px}
    .level-bar{display:flex;gap:10px;flex-wrap:wrap;align-items:center;padding:14px 18px;border-radius:14px;background:var(--paper);border:2px solid var(--border)}
    .level-bar-label{font-family:var(--arcade);font-size:12px;color:var(--text-muted);letter-spacing:.15em}
    .lev-btn{padding:10px 16px;border-radius:10px;background:transparent;border:2px solid var(--border);font-size:13px;font-weight:700;color:var(--text-2);transition:all .18s ease}
    .lev-btn:hover{border-color:var(--gold);color:var(--gold)}
    .lev-btn.is-active{background:var(--gold);color:var(--ink);border-color:var(--gold)}

    .quiz-card{padding:22px;border-radius:18px;background:var(--paper);border:3px solid var(--border);min-height:280px;display:flex;flex-direction:column;justify-content:center;gap:14px;text-align:center}

    .quiz-empty .arrow{display:inline-block;font-size:32px;color:var(--gold);margin-bottom:10px}
    .cat-banner{display:inline-block;padding:8px 16px;border-radius:8px;font-family:var(--arcade);font-size:11px;letter-spacing:.18em;margin:0 auto}
    .q-prompt-label{font-family:var(--arcade);font-size:11px;color:var(--gold);letter-spacing:.15em;margin-bottom:10px}
    .q-prompt{font-family:var(--arabic);font-size:34px;font-weight:700;color:var(--text);direction:rtl;line-height:1.3;margin-bottom:10px}
    .choices{display:grid;grid-template-columns:1fr 1fr;gap:10px}
    .choice{padding:16px 14px;border-radius:12px;background:var(--paper-2);border:2px solid var(--border);font-family:var(--display);font-size:17px;font-weight:800;color:var(--text);transition:all .18s ease;cursor:pointer;min-height:64px}
    .choice:hover:not(:disabled){border-color:var(--purple);color:var(--purple);transform:translateY(-2px)}
    .choice.is-right{background:rgba(74,222,128,.20);border-color:var(--green);color:var(--green)}
    .choice.is-wrong{background:rgba(248,113,113,.20);border-color:var(--red);color:var(--red)}

    .feedback{min-height:24px;font-family:var(--arcade);font-size:12px;text-align:center;color:var(--text-muted);letter-spacing:.1em}
    .feedback.is-right{color:var(--green)} .feedback.is-wrong{color:var(--red)}
    .progress{height:8px;background:var(--paper);border:1px solid var(--border);border-radius:999px;overflow:hidden}
    .progress>span{display:block;height:100%;background:linear-gradient(90deg,var(--purple),var(--gold));transition:width .3s ease;width:0%}
    .stats-row{display:flex;justify-content:space-around;gap:14px;font-family:var(--arcade);font-size:11px;color:var(--text-muted);letter-spacing:.12em;padding:14px;border-radius:12px;background:var(--paper);border:1px solid var(--border)}
    .stats-row b{color:var(--gold);font-size:15px;margin-left:4px}

    .summary{display:none;padding:36px 28px;border-radius:18px;background:var(--paper);border:3px solid var(--gold);text-align:center;box-shadow:0 0 40px rgba(251,191,36,.3)}
    .summary.is-shown{display:block}
    .summary h2{font-family:var(--arcade);font-size:20px;color:var(--gold);margin-bottom:14px;letter-spacing:.05em}
    .summary .stats{display:flex;gap:22px;justify-content:center;margin-bottom:18px;flex-wrap:wrap}
    .stat-num{font-family:var(--arcade);font-size:22px;color:var(--gold)}
    .stat-lbl{font-family:var(--arcade);font-size:9px;color:var(--text-muted);letter-spacing:.12em}
    .btn{padding:14px 24px;border-radius:12px;font-family:var(--display);font-size:14px;font-weight:800;transition:all .18s ease;border:none;cursor:pointer}
    .btn.is-gold{background:linear-gradient(135deg,var(--gold),var(--gold-2));color:var(--ink);box-shadow:0 6px 14px -4px rgba(251,191,36,.45)}
    .btn.is-ghost{background:transparent;color:var(--text-2);border:2px solid var(--border)}
  </style>
</head>

function drawWheel(){
  let svg = ''
  CATEGORIES.forEach((cat, i) => {
    const startAngle = i * SEG_ANGLE - 90
    const endAngle = (i+1) * SEG_ANGLE - 90
    const startRad = startAngle * Math.PI / 180
    const endRad = endAngle * Math.PI / 180
    const x1 = 100 + 100 * Math.cos(startRad)
    const y1 = 100 + 100 * Math.sin(startRad)
    const x2 = 100 + 100 * Math.cos(endRad)
    const y2 = 100 + 100 * Math.sin(endRad)
    const large = SEG_ANGLE > 180 ? 1 : 0
    svg += `<path d="M 100 100 L ${x1} ${y1} A 100 100 0 ${large} 1 ${x2} ${y2} Z" fill="${cat.color}" stroke="#0c0a09" stroke-width="2"/>`
    // emoji + label at center of segment
    const midAngle = (startAngle + endAngle) / 2
    const midRad = midAngle * Math.PI / 180
    const tx = 100 + 62 * Math.cos(midRad)
    const ty = 100 + 62 * Math.sin(midRad)
    svg += `<text x="${tx}" y="${ty}" text-anchor="middle" dominant-baseline="central" font-size="22" transform="rotate(${midAngle + 90}, ${tx}, ${ty})">${cat.em}</text>`
    const lx = 100 + 38 * Math.cos(midRad)
    const ly = 100 + 38 * Math.sin(midRad)
    svg += `<text x="${lx}" y="${ly}" text-anchor="middle" dominant-baseline="central" font-family="Press Start 2P,monospace" font-size="5" fill="#0c0a09" transform="rotate(${midAngle + 90}, ${lx}, ${ly})">${cat.name}</text>`
  })
  wheel.innerHTML = svg
}

function spin(){
  if(spinning) return
  spinning=true
  spinBtn.disabled=true; spinBtn.textContent='SPINNING…'
  const winnerIdx = Math.floor(Math.random() * CATEGORIES.length)
  // angle to make pointer (top, 0deg in wheel coords) align with winnerIdx center
  const targetCenter = winnerIdx * SEG_ANGLE + SEG_ANGLE / 2
  const rotations = 5 + Math.floor(Math.random() * 3)
  // wheel currently at wheelAngle. We need new total such that (new % 360) places center at top (0).
  // Top is at -90 in our svg coords; segments start at -90. Center of segment i is at i*SEG_ANGLE + SEG_ANGLE/2 from start.
  // Rotating wheel by -targetCenter brings that center to the top.
  const finalAngle = rotations * 360 - targetCenter
  wheelAngle = finalAngle
  wheel.style.transform = 'rotate(' + finalAngle + 'deg)'
  if(window.PlaySounds){
    // Simulated tick during spin
    let n = 18
    const tickInt = setInterval(() => { if(!--n) clearInterval(tickInt); PlaySounds.tickLow() }, 180)
  }
  setTimeout(() => { spinning=false; spinBtn.disabled=false; spinBtn.textContent='▶ SPIN AGAIN'; onLanded(CATEGORIES[winnerIdx]) }, 4100)
}

function onLanded(cat){
  currentCat = cat
  if(window.PlaySounds) PlaySounds.win()
  // build 5 questions from this category and level
  const pool = QUESTIONS[cat.name] && (QUESTIONS[cat.name][level] || QUESTIONS[cat.name].A1) || []
  if(pool.length === 0){ feedbackEl.textContent = 'No questions for this category yet — spin again!'; return }
  sessionQuestions = shuffle(pool).slice(0, qTotal)
  qIdx = 0; spins++; spinsEl.textContent = spins
  qTotalEl.textContent = sessionQuestions.length
  feedbackEl.textContent = '🎰 Landed on ' + cat.name + '! Answer ' + sessionQuestions.length + ' questions.'
  feedbackEl.className = 'feedback'
  loadQ()
}

function loadQ(){
  if(qIdx >= sessionQuestions.length){ doneSession(); return }
  const q = sessionQuestions[qIdx]
  qNumEl.textContent = qIdx + 1
  const banner = currentCat.color
  const labelColor = currentCat.light
  const opts = shuffle([{w:q.e,c:true},...q.d.map(w=>({w,c:false}))])
  quizCard.innerHTML = `
    <div><span class="cat-banner" style="background:${labelColor}25;color:${banner};border:1px solid ${banner}66">${currentCat.em} ${currentCat.name}</span></div>
    <div class="q-prompt-label">TRANSLATE TO ENGLISH</div>
    <div class="q-prompt">${q.a}</div>
    <div class="choices">${opts.map(o=>`<button class="choice" data-w="${o.w}" data-c="${o.c?'1':'0'}">${o.w}</button>`).join('')}</div>
  `
  quizCard.querySelectorAll('.choice').forEach(b=>b.addEventListener('click',()=>{
    const isRight = b.dataset.c === '1'
    quizCard.querySelectorAll('.choice').forEach(x=>x.disabled=true)
    totalAttempts++
    if(isRight){
      b.classList.add('is-right')
      score += 10 + streak * 2; streak++; totalCorrect++
      scoreEl.textContent = score; streakEl.textContent = streak
      feedbackEl.textContent = '✓ Correct! +' + (10 + (streak-1)*2)
      feedbackEl.className = 'feedback is-right'
      if(window.PlaySounds) PlaySounds.correct()
    } else {
      b.classList.add('is-wrong')
      streak = 0; streakEl.textContent = '0'
      quizCard.querySelectorAll('.choice').forEach(x=>{if(x.dataset.w===q.e)x.classList.add('is-right')})
      feedbackEl.textContent = '✗ Answer: ' + q.e
      feedbackEl.className = 'feedback is-wrong'
      if(window.PlaySounds) PlaySounds.wrong()
    }
    setTimeout(()=>{qIdx++; updateProgress(); loadQ()}, 1100)
  }))
  updateProgress()
}

function updateProgress(){
  progressBar.style.width = ((qIdx / qTotal) * 100) + '%'
}

function doneSession(){
  // session done — invite to spin again
  quizCard.innerHTML = `
    <div class="quiz-empty">
      <div class="arrow">🎉</div>
      Round complete! Spin the wheel for a new category.
    </div>
  `
  qIdx = 0; updateProgress()
  if(window.PlaySounds) PlaySounds.win()
  // update summary
  const acc = totalAttempts ? Math.round(totalCorrect / totalAttempts * 100) : 0
  document.getElementById('sumScore').textContent = score
  document.getElementById('sumAcc').textContent = acc + '%'
  // record progress
  if(window.PlayProgress){
    PlayProgress.record(GAME_ID, level, score, score || 1)
    const lv = PlayProgress.getLevel(GAME_ID, level)
    document.getElementById('sumBest').textContent = lv.best
    bestEl.textContent = lv.best
  }
  summary.classList.add('is-shown')
}

document.getElementById('resetBtn').addEventListener('click',()=>{score=0;streak=0;qIdx=0;spins=0;totalAttempts=0;totalCorrect=0;scoreEl.textContent='0';streakEl.textContent='0';spinsEl.textContent='0';qNumEl.textContent='0';summary.classList.remove('is-shown')})
spinBtn.addEventListener('click',spin)
document.querySelectorAll('.lev-btn').forEach(b=>b.addEventListener('click',()=>{document.querySelectorAll('.lev-btn').forEach(x=>x.classList.remove('is-active'));b.classList.add('is-active');level=b.dataset.level; if(window.PlayProgress) bestEl.textContent=PlayProgress.getLevel(GAME_ID,level).best||0}))

drawWheel()
if(window.PlayProgress) bestEl.textContent = PlayProgress.getLevel(GAME_ID, level).best || 0
</script>
</body>

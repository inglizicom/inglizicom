<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>Business English — Sahla · Inglizi.com</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800;900&family=DM+Sans:wght@400;500;600;700;800;900&family=Cairo:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    img, svg { display: block; max-width: 100%; }
    button { font-family: inherit; cursor: pointer; }

    :root {
      /* Brand */
      --blue:        #1e3a8a;
      --blue-deep:   #172554;
      --blue-bright: #2563eb;

      /* Beige / cream palette */
      --bg:          #f5efe0;        /* warm linen background */
      --paper:       #fdfaf0;        /* card surface (cream paper) */
      --paper-soft:  #faf3e0;        /* alt card / hover */
      --paper-deep:  #f0e6cd;        /* nested elements */
      --border:      #e0d4b2;        /* sand */
      --border-soft: #ece2c5;

      --gold:        #b45309;        /* deeper amber for cream contrast */
      --gold-bright: #d97706;
      --gold-soft:   #fef3c7;

      /* Text */
      --text:        #1c1917;        /* warm black */
      --text-2:      #44403c;
      --text-muted:  #78716c;
      --text-dim:    #a8a29e;

      --green:       #15803d;

      /* Type */
      --display:     'Outfit', 'DM Sans', system-ui, sans-serif;
      --sans:        'DM Sans', system-ui, -apple-system, sans-serif;
      --arabic:      'Cairo', 'Tajawal', system-ui, sans-serif;
      --mono:        'JetBrains Mono', ui-monospace, monospace;
    }

    html, body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      font-size: 16px;
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
      min-height: 100%;
      overflow-x: hidden;
    }
    body[data-arabic] {
      font-family: var(--arabic);
    }
    body::before {
      content: ""; position: fixed; inset: 0; pointer-events: none; z-index: 0;
      background:
        radial-gradient(ellipse 50% 35% at 85% 5%, rgba(180, 83, 9, 0.06), transparent 60%),
        radial-gradient(ellipse 50% 35% at 5% 95%, rgba(30, 58, 138, 0.05), transparent 60%);
    }

    /* ── Top bar ───────────────────────────────────────────── */
    .topbar {
      position: sticky; top: 0; z-index: 100;
      background: rgba(245, 239, 224, 0.82);
      backdrop-filter: blur(18px) saturate(180%);
      -webkit-backdrop-filter: blur(18px) saturate(180%);
      border-bottom: 1px solid var(--border-soft);
      padding: 14px 28px;
      display: flex; align-items: center; justify-content: space-between;
      transition: transform 0.3s ease, opacity 0.3s ease;
    }
    .topbar-left {
      display: flex; align-items: center; gap: 12px;
      text-decoration: none; color: inherit;
    }
    .crest {
      width: 38px; height: 38px; border-radius: 12px;
      background: linear-gradient(135deg, var(--blue), var(--blue-deep));
      color: white;
      display: flex; align-items: center; justify-content: center;
      font-family: var(--display); font-weight: 800; font-size: 17px;
      letter-spacing: -0.02em;
      box-shadow: 0 6px 16px -4px rgba(30, 58, 138, 0.32);
    }
    .brand-stack { display: flex; flex-direction: column; }
    .brand-name {
      font-family: var(--display); font-size: 16px; font-weight: 800;
      color: var(--text); letter-spacing: -0.02em; line-height: 1.1;
    }
    .brand-sub {
      font-size: 10px; color: var(--text-muted);
      letter-spacing: 0.18em; text-transform: uppercase; font-weight: 700; line-height: 1.4;
    }
    .topbar-right { display: flex; align-items: center; gap: 8px; }
    .pill-link {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 8px 14px; border-radius: 999px;
      color: var(--text-2); text-decoration: none;
      font-family: var(--display); font-size: 13px; font-weight: 700;
      border: none; background: transparent;
      transition: all 0.18s ease;
    }
    .pill-link:hover { background: var(--paper); color: var(--blue); }
    .pill-link.is-active {
      background: var(--blue); color: white;
      box-shadow: 0 4px 12px -3px rgba(30, 58, 138, 0.35);
    }
    .pill-link.is-wa { color: var(--green); }
    .pill-link.is-wa:hover { background: rgba(21, 128, 61, 0.08); }

    /* ── Page ──────────────────────────────────────────────── */
    .page { position: relative; z-index: 2; max-width: 1240px; margin: 0 auto; padding: 48px 28px; }
    .view { animation: fadeIn 0.45s ease both; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }

    /* ── HUB hero ──────────────────────────────────────────── */
    .hub-hero {
      background: linear-gradient(135deg, var(--blue) 0%, var(--blue-deep) 60%, #3730a3 100%);
      color: white;
      border-radius: 28px;
      padding: 56px 48px 44px;
      position: relative; overflow: hidden;
      margin-bottom: 56px;
      box-shadow: 0 28px 60px -22px rgba(30, 58, 138, 0.4);
    }
    .hub-hero::before {
      content: ""; position: absolute; top: -100px; right: -60px;
      width: 360px; height: 360px; border-radius: 50%;
      background: radial-gradient(circle, rgba(217, 119, 6, 0.32), transparent 70%);
      pointer-events: none;
    }
    .hub-hero::after {
      content: ""; position: absolute; bottom: -140px; left: -80px;
      width: 360px; height: 360px; border-radius: 50%;
      background: radial-gradient(circle, rgba(253, 250, 240, 0.07), transparent 70%);
      pointer-events: none;
    }
    .hub-hero-inner { position: relative; z-index: 1; }
    .hub-eyebrow {
      display: inline-flex; align-items: center; gap: 10px;
      padding: 6px 14px; border-radius: 999px;
      background: rgba(217, 119, 6, 0.16); color: #fbbf24;
      font-family: var(--display); font-size: 11px; font-weight: 800;
      letter-spacing: 0.2em; text-transform: uppercase;
      margin-bottom: 20px; border: 1px solid rgba(217, 119, 6, 0.32);
    }
    .hub-eyebrow .dot { width: 6px; height: 6px; border-radius: 50%; background: #fbbf24; animation: pulse 2s infinite; }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
    .hub-title {
      font-family: var(--display); font-weight: 900;
      font-size: clamp(40px, 7vw, 80px); line-height: 1; letter-spacing: -0.03em;
      margin-bottom: 16px;
    }
    .hub-title-accent { color: #fbbf24; }
    .hub-title-ar {
      font-family: var(--arabic); font-weight: 600;
      font-size: clamp(18px, 2.4vw, 26px); color: rgba(253, 250, 240, 0.85); direction: rtl;
      max-width: 620px; line-height: 1.7;
    }
    .hub-stats {
      display: flex; gap: 36px; flex-wrap: wrap;
      margin-top: 36px; padding-top: 26px;
      border-top: 1px solid rgba(255, 255, 255, 0.14);
    }
    .stat-item { display: flex; flex-direction: column; gap: 4px; }
    .stat-num {
      font-family: var(--display); font-size: 32px; font-weight: 900;
      color: #fbbf24; line-height: 1; letter-spacing: -0.02em;
    }
    .stat-label {
      font-family: var(--display); font-size: 10px; font-weight: 700;
      color: rgba(255, 255, 255, 0.6);
      letter-spacing: 0.22em; text-transform: uppercase;
    }

    /* ── Section heading ───────────────────────────────────── */
    .section-head {
      display: flex; align-items: center; gap: 16px;
      margin: 0 0 28px;
    }
    .section-num {
      font-family: var(--display); font-size: 11px; font-weight: 800;
      color: var(--gold); letter-spacing: 0.2em; text-transform: uppercase;
      padding: 5px 11px; background: var(--gold-soft); border-radius: 6px;
    }
    .section-head h2 {
      font-family: var(--display); font-size: clamp(24px, 3vw, 34px); font-weight: 800;
      flex: 1; color: var(--text); letter-spacing: -0.02em; line-height: 1.15;
    }
    .section-head .section-sub {
      font-family: var(--arabic); font-size: 14px; color: var(--text-muted); direction: rtl; font-weight: 600;
    }

    /* ── Unit cards grid (hub) ─────────────────────────────── */
    .units-grid {
      display: grid; gap: 20px;
      grid-template-columns: repeat(auto-fill, minmax(360px, 1fr));
    }
    .unit-card {
      display: flex; flex-direction: column;
      background: var(--paper);
      padding: 28px 28px 24px;
      border-radius: 20px; border: 1px solid var(--border);
      text-decoration: none; color: inherit;
      transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
      position: relative; overflow: hidden;
      box-shadow: 0 1px 0 rgba(115, 99, 53, 0.05);
    }
    .unit-card:hover {
      transform: translateY(-4px);
      background: var(--paper-soft);
      border-color: var(--blue-bright);
      box-shadow: 0 24px 48px -16px rgba(30, 58, 138, 0.18);
    }
    .unit-card:hover .unit-num-circle {
      background: var(--blue-bright); color: white;
      transform: rotate(-3deg) scale(1.05);
    }
    .unit-card:hover .unit-cta { color: var(--blue-bright); gap: 12px; }

    .unit-card-head {
      display: flex; align-items: flex-start; justify-content: space-between;
      margin-bottom: 22px;
    }
    .unit-num-circle {
      display: flex; align-items: center; justify-content: center;
      width: 52px; height: 52px; border-radius: 14px;
      background: var(--paper-deep); color: var(--blue);
      font-family: var(--display); font-weight: 900; font-size: 20px;
      letter-spacing: -0.02em;
      transition: all 0.25s ease;
      border: 1px solid var(--border-soft);
    }
    .unit-emoji { font-size: 32px; }

    .unit-title {
      font-family: var(--display); font-size: 22px; font-weight: 800;
      line-height: 1.2; color: var(--text);
      letter-spacing: -0.01em; margin-bottom: 6px;
    }
    .unit-title-ar {
      font-family: var(--arabic); font-size: 14px; color: var(--text-muted);
      direction: rtl; font-weight: 600; line-height: 1.7;
    }

    .unit-tags {
      display: flex; gap: 6px; flex-wrap: wrap;
      margin-top: 22px;
    }
    .unit-tag {
      padding: 5px 11px; border-radius: 999px;
      background: var(--paper-deep); color: var(--text-2);
      font-family: var(--display); font-size: 11px; font-weight: 700;
      letter-spacing: 0.04em;
      border: 1px solid var(--border-soft);
    }
    .unit-tag.is-level { background: var(--gold-soft); color: var(--gold); border-color: rgba(180, 83, 9, 0.18); }

    .unit-cta {
      display: flex; align-items: center; gap: 8px;
      margin-top: 22px; padding-top: 18px;
      border-top: 1px dashed var(--border);
      color: var(--blue);
      font-family: var(--display); font-size: 13px; font-weight: 800;
      letter-spacing: -0.01em;
      transition: all 0.25s ease;
    }
    .unit-cta-arrow {
      display: inline-flex; align-items: center; justify-content: center;
      width: 24px; height: 24px; border-radius: 50%;
      background: var(--paper-deep); color: var(--blue);
      transition: all 0.25s ease;
    }
    .unit-card:hover .unit-cta-arrow { background: var(--blue-bright); color: white; }

    /* ── UNIT view (slide mode) ────────────────────────────── */
    .unit-view {
      padding: 16px 0 60px;
      min-height: calc(100vh - 80px);
      display: flex; flex-direction: column;
    }

    .slide-controls {
      display: flex; align-items: center; gap: 14px;
      padding-bottom: 22px;
      margin-bottom: 28px;
      border-bottom: 1px solid var(--border-soft);
    }
    .slide-back {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 8px 14px; border-radius: 999px;
      background: var(--paper); border: 1px solid var(--border);
      color: var(--text-2); text-decoration: none;
      font-family: var(--display); font-size: 12px; font-weight: 700;
      transition: all 0.18s ease;
    }
    .slide-back:hover { background: var(--paper-soft); border-color: var(--blue-bright); color: var(--blue); }

    .slide-dots {
      flex: 1;
      display: flex; gap: 6px; align-items: center; justify-content: center;
    }
    .slide-dot {
      width: 32px; height: 4px; border-radius: 999px;
      background: var(--border); border: none;
      transition: all 0.25s ease;
      padding: 0;
    }
    .slide-dot.is-done { background: var(--blue-bright); }
    .slide-dot.is-current { background: var(--blue); width: 56px; }

    .slide-meta {
      display: inline-flex; align-items: center; gap: 6px;
      font-family: var(--mono); font-size: 11px; color: var(--text-muted); font-weight: 600;
    }
    .slide-meta b { color: var(--blue); font-family: var(--display); font-weight: 800; }

    .fullscreen-btn {
      width: 36px; height: 36px; border-radius: 10px;
      background: var(--paper); border: 1px solid var(--border);
      color: var(--text-2); display: flex; align-items: center; justify-content: center;
      transition: all 0.18s ease;
    }
    .fullscreen-btn:hover { background: var(--paper-soft); border-color: var(--blue-bright); color: var(--blue); }
    .fullscreen-btn svg { width: 16px; height: 16px; }

    /* Slide container */
    .slide {
      flex: 1;
      display: flex; flex-direction: column;
      animation: slideIn 0.4s cubic-bezier(0.16, 1, 0.3, 1) both;
    }
    @keyframes slideIn { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
    .slide.is-exiting { animation: slideOut 0.2s ease both; }
    @keyframes slideOut { to { opacity: 0; transform: translateY(-8px); } }

    /* Cover slide */
    .cover-slide {
      background: var(--paper);
      border: 1px solid var(--border);
      border-radius: 28px;
      padding: 56px 44px;
      position: relative; overflow: hidden;
      box-shadow: 0 18px 50px -20px rgba(115, 99, 53, 0.15);
    }
    .cover-slide::before {
      content: ""; position: absolute; top: 0; left: 0; right: 0; height: 6px;
      background: linear-gradient(90deg, var(--blue), var(--blue-bright), var(--gold-bright));
    }
    .cover-grid {
      display: grid; gap: 32px; grid-template-columns: 1fr;
      align-items: center;
    }
    @media (min-width: 720px) { .cover-grid { grid-template-columns: 140px 1fr; } }

    .cover-num {
      display: flex; flex-direction: column; align-items: center; gap: 12px;
    }
    .cover-num-pill {
      display: flex; align-items: center; justify-content: center;
      width: 120px; height: 120px; border-radius: 28px;
      background: linear-gradient(135deg, var(--blue), var(--blue-deep));
      color: white;
      font-family: var(--display); font-weight: 900; font-size: 52px;
      letter-spacing: -0.04em;
      box-shadow: 0 16px 36px -10px rgba(30, 58, 138, 0.4);
    }
    .cover-emoji-big { font-size: 44px; }

    .cover-titles { display: flex; flex-direction: column; gap: 14px; }
    .cover-eyebrow {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 5px 14px; border-radius: 999px;
      background: var(--gold-soft); color: var(--gold);
      font-family: var(--display); font-size: 10px; font-weight: 800;
      letter-spacing: 0.22em; text-transform: uppercase;
      width: fit-content;
    }
    .cover-title-en {
      font-family: var(--display); font-size: clamp(32px, 5vw, 56px); font-weight: 900;
      letter-spacing: -0.025em; line-height: 1.05; color: var(--text);
    }
    .cover-title-ar {
      font-family: var(--arabic); font-size: clamp(18px, 2.4vw, 24px); font-weight: 600;
      color: var(--text-muted); direction: rtl; line-height: 1.7;
    }
    .cover-stats {
      display: flex; gap: 28px; flex-wrap: wrap;
      margin-top: 16px; padding-top: 20px;
      border-top: 1px solid var(--border-soft);
    }
    .cover-stat { display: flex; flex-direction: column; gap: 2px; }
    .cover-stat-num {
      font-family: var(--display); font-size: 24px; font-weight: 900; color: var(--blue);
      letter-spacing: -0.02em; line-height: 1;
    }
    .cover-stat-label {
      font-family: var(--display); font-size: 10px; font-weight: 700; color: var(--text-muted);
      letter-spacing: 0.16em; text-transform: uppercase;
    }

    .cover-overview {
      margin-top: 32px; padding-top: 28px;
      border-top: 1px solid var(--border-soft);
    }
    .cover-overview-label {
      font-family: var(--display); font-size: 11px; font-weight: 800;
      color: var(--gold); letter-spacing: 0.2em; text-transform: uppercase;
      margin-bottom: 12px;
    }
    .cover-overview-list {
      display: grid; gap: 8px;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      list-style: none;
    }
    .cover-overview-item {
      display: flex; align-items: center; gap: 12px;
      padding: 12px 14px; border-radius: 10px;
      background: var(--paper-soft); border: 1px solid var(--border-soft);
      font-family: var(--display); font-size: 14px; font-weight: 600; color: var(--text-2);
    }
    .cover-overview-num {
      display: inline-flex; align-items: center; justify-content: center;
      width: 24px; height: 24px; border-radius: 6px;
      background: var(--blue); color: white;
      font-family: var(--display); font-size: 11px; font-weight: 800;
      flex-shrink: 0;
    }

    .cover-cta {
      margin-top: 32px;
      display: inline-flex; align-items: center; gap: 12px;
      padding: 16px 28px; border-radius: 14px;
      background: var(--blue); color: white;
      font-family: var(--display); font-size: 14px; font-weight: 800;
      letter-spacing: -0.01em;
      border: none;
      box-shadow: 0 10px 24px -8px rgba(30, 58, 138, 0.4);
      transition: all 0.18s ease;
    }
    .cover-cta:hover { background: var(--blue-bright); transform: translateY(-2px); }
    .cover-cta kbd {
      background: rgba(255, 255, 255, 0.15); border: 1px solid rgba(255, 255, 255, 0.25);
      padding: 2px 8px; border-radius: 5px;
      font-family: var(--mono); font-size: 11px; font-weight: 600;
    }

    /* Category slide */
    .cat-slide {
      background: var(--paper);
      border: 1px solid var(--border);
      border-radius: 28px;
      padding: 44px;
      position: relative; overflow: hidden;
      box-shadow: 0 18px 50px -20px rgba(115, 99, 53, 0.15);
    }
    .cat-slide::before {
      content: ""; position: absolute; top: 0; left: 0; bottom: 0;
      width: 6px; background: var(--cat-color, var(--blue-bright));
    }

    .cat-header {
      display: flex; align-items: flex-start; gap: 18px; margin-bottom: 32px;
      padding-bottom: 24px; border-bottom: 1px solid var(--border-soft);
    }
    .cat-num-big {
      display: flex; align-items: center; justify-content: center;
      width: 64px; height: 64px; border-radius: 18px;
      background: var(--cat-soft, var(--gold-soft)); color: var(--cat-color, var(--gold));
      font-family: var(--display); font-weight: 900; font-size: 26px;
      flex-shrink: 0;
    }
    .cat-titles { flex: 1; padding-top: 4px; }
    .cat-en-big {
      font-family: var(--display); font-size: clamp(24px, 3.2vw, 36px); font-weight: 900;
      letter-spacing: -0.02em; color: var(--text); line-height: 1.15;
    }
    .cat-ar-big {
      font-family: var(--arabic); font-size: clamp(16px, 2vw, 20px); color: var(--text-muted);
      direction: rtl; font-weight: 600; margin-top: 6px;
    }
    .cat-count-pill {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 6px 12px; border-radius: 999px;
      background: var(--paper-deep); color: var(--text-2);
      font-family: var(--display); font-size: 11px; font-weight: 700;
      letter-spacing: 0.06em;
      border: 1px solid var(--border-soft);
    }
    .cat-count-pill::before {
      content: ""; width: 6px; height: 6px; border-radius: 50%; background: var(--cat-color, var(--blue));
    }

    .phrase-list { display: grid; gap: 12px; }
    .phrase {
      display: grid; gap: 12px; grid-template-columns: 1fr;
      padding: 20px 22px; border-radius: 14px;
      background: var(--paper-soft);
      transition: all 0.2s ease;
      border: 1px solid var(--border-soft);
    }
    .phrase:hover {
      background: var(--paper);
      border-color: var(--cat-color, var(--blue-bright));
      transform: translateX(4px);
    }
    @media (min-width: 720px) {
      .phrase { grid-template-columns: 1fr 1fr; gap: 24px; align-items: start; }
    }
    .phrase-main { display: flex; flex-direction: column; gap: 8px; }
    .phrase-en {
      font-family: var(--display); font-size: clamp(16px, 1.7vw, 19px); font-weight: 700;
      color: var(--text); line-height: 1.45; letter-spacing: -0.005em;
    }
    .phrase-ar {
      font-family: var(--arabic); font-size: 15px; color: var(--text-2);
      direction: rtl; font-weight: 500; line-height: 1.75;
    }
    .phrase-aside { display: flex; flex-direction: column; gap: 8px; }
    .phrase-examples {
      padding: 10px 14px; border-radius: 10px;
      background: var(--paper); border: 1px dashed var(--border);
    }
    .phrase-examples-label {
      font-family: var(--display); font-size: 9px; font-weight: 800;
      color: var(--cat-color, var(--gold));
      letter-spacing: 0.22em; text-transform: uppercase; margin-bottom: 6px;
    }
    .phrase-example {
      font-family: var(--display); font-style: italic; font-size: 13px;
      color: var(--text-2); line-height: 1.5; padding: 2px 0;
    }
    .phrase-note {
      padding: 8px 12px; border-radius: 8px;
      background: rgba(180, 83, 9, 0.07); border: 1px solid rgba(180, 83, 9, 0.15);
      font-family: var(--arabic); font-size: 13px; color: var(--gold);
      direction: rtl; font-weight: 600;
    }

    /* Conversation slide */
    .convo-slide {
      background: var(--paper);
      border: 1px solid var(--border);
      border-radius: 28px;
      padding: 0;
      overflow: hidden;
      box-shadow: 0 18px 50px -20px rgba(115, 99, 53, 0.15);
    }
    .convo-header {
      padding: 32px 40px; border-bottom: 1px solid var(--border-soft);
      background: linear-gradient(135deg, var(--blue), var(--blue-deep));
      color: white;
    }
    .convo-header-eyebrow {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 4px 12px; border-radius: 999px;
      background: rgba(217, 119, 6, 0.18); color: #fbbf24;
      font-family: var(--display); font-size: 10px; font-weight: 800;
      letter-spacing: 0.2em; text-transform: uppercase;
      margin-bottom: 10px;
    }
    .convo-header-title {
      font-family: var(--display); font-size: 26px; font-weight: 800;
      letter-spacing: -0.01em; line-height: 1.2;
    }
    .convo-header-sub {
      font-family: var(--arabic); font-size: 14px; color: rgba(253, 250, 240, 0.7);
      direction: rtl; margin-top: 4px; font-weight: 500;
    }
    .convo-note {
      padding: 16px 40px;
      background: var(--gold-soft); border-bottom: 1px solid var(--border-soft);
      font-family: var(--display); font-style: italic; font-size: 14px;
      color: var(--gold); line-height: 1.55;
    }
    .convo-lines { padding: 8px 0; }
    .convo-line {
      display: grid; grid-template-columns: 110px 1fr; gap: 20px;
      padding: 16px 40px;
      border-bottom: 1px solid var(--border-soft);
    }
    .convo-line:last-child { border-bottom: none; }
    .convo-speaker {
      font-family: var(--display); font-size: 13px; font-weight: 800;
      color: var(--blue);
      padding-top: 2px;
      display: inline-flex; align-items: center; gap: 6px;
    }
    .convo-speaker::before {
      content: ""; width: 6px; height: 6px; border-radius: 50%; background: var(--blue);
    }
    .convo-text {
      font-family: var(--display); font-size: 16px; color: var(--text);
      line-height: 1.65; font-weight: 500;
    }

    /* Quiz slide */
    .quiz-slide {
      display: flex; flex-direction: column; gap: 18px;
    }
    .quiz-slide-header {
      background: var(--paper); border: 1px solid var(--border);
      border-radius: 20px;
      padding: 28px 32px;
      border-left: 6px solid var(--gold);
    }
    .quiz-slide-eyebrow {
      font-family: var(--display); font-size: 11px; font-weight: 800;
      color: var(--gold); letter-spacing: 0.22em; text-transform: uppercase;
      margin-bottom: 10px;
    }
    .quiz-slide-title {
      font-family: var(--display); font-size: 28px; font-weight: 900;
      color: var(--text); letter-spacing: -0.02em; line-height: 1.15;
    }
    .quiz-slide-sub {
      font-family: var(--arabic); font-size: 14px; color: var(--text-muted);
      direction: rtl; font-weight: 600; margin-top: 6px;
    }
    .quiz-list { display: grid; gap: 14px; }
    .quiz-item {
      background: var(--paper); border: 1px solid var(--border);
      border-radius: 16px; padding: 24px 26px;
      transition: border-color 0.25s ease;
    }
    .quiz-item.is-revealed { border-color: var(--green); background: rgba(21, 128, 61, 0.04); }
    .quiz-q {
      font-family: var(--arabic); font-size: 16px; color: var(--text); direction: rtl; font-weight: 700;
      line-height: 1.7; margin-bottom: 14px;
      display: flex; align-items: baseline; gap: 8px; justify-content: flex-end;
    }
    .quiz-q-num {
      display: inline-flex; align-items: center; justify-content: center;
      width: 26px; height: 26px; border-radius: 8px; background: var(--paper-deep); color: var(--blue);
      font-family: var(--display); font-size: 11px; font-weight: 900;
      flex-shrink: 0; border: 1px solid var(--border-soft);
    }
    .quiz-choices { display: grid; gap: 6px; }
    .quiz-choice {
      padding: 12px 16px; border-radius: 10px;
      background: var(--paper-soft); border: 1px solid transparent;
      font-family: var(--display); font-size: 14px; color: var(--text-2); font-weight: 500;
      text-align: left; width: 100%;
      display: flex; align-items: center; gap: 12px;
      transition: all 0.2s ease;
    }
    .quiz-choice:hover { background: var(--paper); border-color: var(--blue-bright); color: var(--text); }
    .quiz-choice-letter {
      display: inline-flex; align-items: center; justify-content: center;
      width: 22px; height: 22px; border-radius: 6px;
      background: var(--paper-deep); color: var(--text-muted);
      font-family: var(--mono); font-size: 11px; font-weight: 700;
      flex-shrink: 0; border: 1px solid var(--border-soft);
    }
    .quiz-choice.is-correct {
      background: rgba(21, 128, 61, 0.08); border-color: var(--green);
      color: var(--text); font-weight: 700;
    }
    .quiz-choice.is-correct .quiz-choice-letter {
      background: var(--green); color: white; border-color: var(--green);
    }
    .quiz-choice.is-correct::after {
      content: "✓"; margin-left: auto; color: var(--green); font-weight: 800; font-family: var(--display);
    }
    .quiz-reveal-btn {
      margin-top: 14px; padding: 9px 16px; border-radius: 10px;
      background: var(--blue); color: white; border: none;
      font-family: var(--display); font-size: 12px; font-weight: 700;
      letter-spacing: 0.04em;
      transition: background 0.2s ease;
    }
    .quiz-reveal-btn:hover { background: var(--blue-bright); }
    .quiz-item.is-revealed .quiz-reveal-btn { display: none; }

    /* Review slide */
    .review-slide {
      background: var(--paper); border: 1px solid var(--border);
      border-radius: 28px;
      padding: 44px;
      box-shadow: 0 18px 50px -20px rgba(115, 99, 53, 0.15);
    }
    .review-grid {
      display: grid; gap: 14px;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      margin-top: 28px;
    }
    .review-card {
      padding: 20px 22px; border-radius: 16px;
      background: var(--paper-soft); border: 1px solid var(--border-soft);
      transition: all 0.2s ease;
    }
    .review-card:hover { border-color: var(--blue-bright); transform: translateY(-2px); background: var(--paper); }
    .review-en {
      font-family: var(--display); font-size: 16px; font-weight: 700;
      color: var(--text); line-height: 1.45; margin-bottom: 6px;
    }
    .review-ar {
      font-family: var(--arabic); font-size: 14px; color: var(--text-muted);
      direction: rtl; font-weight: 500; line-height: 1.65;
    }

    .review-cta {
      margin-top: 36px; padding: 28px 32px; border-radius: 20px;
      background: linear-gradient(135deg, var(--blue) 0%, var(--blue-deep) 100%);
      color: white;
      display: flex; align-items: center; justify-content: space-between; gap: 20px;
      flex-wrap: wrap; position: relative; overflow: hidden;
    }
    .review-cta::before {
      content: ""; position: absolute; top: -50px; right: -30px;
      width: 200px; height: 200px; border-radius: 50%;
      background: radial-gradient(circle, rgba(217, 119, 6, 0.3), transparent 70%);
    }
    .review-cta-text { position: relative; flex: 1; min-width: 220px; }
    .review-cta-h {
      font-family: var(--display); font-size: 22px; font-weight: 800;
      letter-spacing: -0.01em; margin-bottom: 4px;
    }
    .review-cta-sub {
      font-family: var(--arabic); font-size: 14px; color: rgba(253, 250, 240, 0.78);
      direction: rtl; font-weight: 500;
    }
    .review-cta-btn {
      position: relative;
      display: inline-flex; align-items: center; gap: 10px;
      padding: 14px 24px; border-radius: 12px;
      background: white; color: var(--blue);
      text-decoration: none;
      font-family: var(--display); font-size: 13px; font-weight: 800;
      letter-spacing: -0.01em;
      transition: all 0.2s ease;
      box-shadow: 0 6px 14px -4px rgba(0, 0, 0, 0.25);
    }
    .review-cta-btn:hover { transform: translateY(-2px); }

    .review-next-unit {
      margin-top: 18px; padding: 22px 26px; border-radius: 16px;
      background: var(--paper); border: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between; gap: 16px;
      flex-wrap: wrap;
      text-decoration: none; color: inherit;
      transition: all 0.2s ease;
    }
    .review-next-unit:hover { border-color: var(--blue-bright); transform: translateX(4px); }
    .review-next-unit-text {
      display: flex; flex-direction: column; gap: 4px;
    }
    .review-next-direction {
      font-family: var(--display); font-size: 11px; font-weight: 800;
      color: var(--gold); letter-spacing: 0.18em; text-transform: uppercase;
    }
    .review-next-title {
      font-family: var(--display); font-size: 18px; font-weight: 800;
      color: var(--text); letter-spacing: -0.01em;
    }
    .review-next-title-ar {
      font-family: var(--arabic); font-size: 13px; color: var(--text-muted);
      direction: rtl; font-weight: 500;
    }
    .review-next-arrow {
      display: inline-flex; align-items: center; justify-content: center;
      width: 40px; height: 40px; border-radius: 50%;
      background: var(--blue); color: white;
      font-size: 20px;
    }

    /* ── Page footer ───────────────────────────────────────── */
    .page-footer {
      max-width: 1240px; margin: 70px auto 0; padding: 28px;
      border-top: 1px solid var(--border-soft);
      display: flex; justify-content: space-between; align-items: center;
      gap: 18px; flex-wrap: wrap;
      transition: opacity 0.3s ease;
    }
    .footer-brand {
      font-family: var(--display); font-weight: 900; font-size: 16px;
      color: var(--blue); letter-spacing: -0.02em;
    }
    .footer-contact {
      display: flex; gap: 20px; flex-wrap: wrap; align-items: center;
      font-family: var(--display); font-size: 12px; color: var(--text-muted); font-weight: 600;
    }
    .footer-contact b { color: var(--green); margin-right: 4px; }
    .footer-contact span[dir="rtl"] { font-family: var(--arabic); font-size: 14px; font-weight: 500; }

    /* ── Fullscreen mode ───────────────────────────────────── */
    body.is-fullscreen .topbar,
    body.is-fullscreen .page-footer,
    body.is-fullscreen .breadcrumb {
      opacity: 0; pointer-events: none; transform: translateY(-100%);
    }
    body.is-fullscreen .topbar { transform: translateY(-100%); position: fixed; }
    body.is-fullscreen .page-footer { display: none; }
    body.is-fullscreen .page { padding-top: 24px; max-width: 1480px; }

    /* On-screen nav hint (mobile + always-visible swipe hint) */
    .slide-nav-hint {
      position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
      background: var(--paper); border: 1px solid var(--border);
      padding: 8px 14px; border-radius: 999px;
      box-shadow: 0 8px 20px -6px rgba(0, 0, 0, 0.15);
      display: flex; gap: 14px; align-items: center;
      font-family: var(--display); font-size: 11px; color: var(--text-muted); font-weight: 600;
      letter-spacing: 0.04em;
      z-index: 50;
      animation: hintFade 0.6s ease 0.5s both;
    }
    @keyframes hintFade { from { opacity: 0; transform: translate(-50%, 10px); } to { opacity: 1; transform: translate(-50%, 0); } }
    .slide-nav-hint kbd {
      background: var(--paper-deep); border: 1px solid var(--border-soft);
      padding: 2px 6px; border-radius: 5px;
      font-family: var(--mono); font-size: 10px; font-weight: 700; color: var(--text-2);
    }
    .slide-nav-arrows { display: flex; gap: 6px; }
    .slide-nav-arrow {
      width: 28px; height: 28px; border-radius: 8px;
      background: var(--paper-soft); border: 1px solid var(--border);
      color: var(--text-2);
      display: flex; align-items: center; justify-content: center;
      transition: all 0.18s ease;
    }
    .slide-nav-arrow:hover:not(:disabled) { background: var(--blue); color: white; border-color: var(--blue); }
    .slide-nav-arrow:disabled { opacity: 0.4; cursor: not-allowed; }

    /* ── Hub: progress on unit cards ───────────────────────── */
    .unit-tag.is-progress {
      background: var(--gold-soft); color: var(--gold);
      border-color: rgba(180, 83, 9, 0.25);
    }
    .unit-progress-track {
      height: 4px; background: var(--paper-deep); border-radius: 999px;
      overflow: hidden; margin-top: 16px;
    }
    .unit-progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--blue), var(--gold-bright));
      border-radius: 999px;
      transition: width 0.4s ease;
    }
    .unit-card.has-progress { border-color: rgba(180, 83, 9, 0.25); }

    /* ── Category: progress bar + play-all button ──────────── */
    .cat-play-btn {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 9px 14px; border-radius: 999px;
      background: var(--cat-soft, var(--paper-deep)); color: var(--cat-color, var(--blue));
      border: 1px solid var(--cat-color, var(--blue));
      font-family: var(--display); font-size: 12px; font-weight: 700;
      letter-spacing: 0.04em; flex-shrink: 0;
      transition: all 0.18s ease;
    }
    .cat-play-btn:hover { background: var(--cat-color, var(--blue)); color: white; }
    .cat-play-btn.is-playing { background: var(--cat-color, var(--blue)); color: white; animation: pulseGlow 1.4s ease-in-out infinite; }
    .cat-play-btn svg { width: 14px; height: 14px; }
    @keyframes pulseGlow { 0%, 100% { box-shadow: 0 0 0 0 currentColor; } 50% { box-shadow: 0 0 0 6px transparent; } }

    .cat-progress {
      display: flex; align-items: center; gap: 14px;
      padding: 10px 14px; border-radius: 12px;
      background: var(--paper-soft); border: 1px solid var(--border-soft);
      margin-bottom: 22px;
    }
    .cat-progress-bar { flex: 1; height: 6px; background: var(--paper-deep); border-radius: 999px; overflow: hidden; }
    .cat-progress-fill { height: 100%; border-radius: 999px; transition: width 0.5s cubic-bezier(0.16, 1, 0.3, 1); }
    .cat-progress-text { font-family: var(--display); font-size: 12px; color: var(--text-muted); font-weight: 600; white-space: nowrap; }
    .cat-progress-text b { color: var(--text); font-weight: 800; font-family: var(--mono); }

    /* ── Phrase: speak icon + got it button + learned state ── */
    .phrase.is-learned {
      background: rgba(21, 128, 61, 0.05);
      border-color: rgba(21, 128, 61, 0.25);
    }
    .phrase.is-learned .phrase-en { color: var(--text-2); }

    .phrase-en {
      display: flex; align-items: center; gap: 10px;
      flex-wrap: wrap;
    }
    .phrase-en > span { flex: 1; min-width: 0; }
    .phrase-speak {
      width: 32px; height: 32px; border-radius: 8px;
      background: var(--paper); border: 1px solid var(--border);
      color: var(--cat-color, var(--blue));
      display: inline-flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      transition: all 0.18s ease;
    }
    .phrase-speak svg { width: 15px; height: 15px; }
    .phrase-speak:hover {
      background: var(--cat-color, var(--blue)); color: white;
      border-color: var(--cat-color, var(--blue)); transform: scale(1.05);
    }
    .phrase-speak.is-speaking {
      background: var(--cat-color, var(--blue)); color: white;
      animation: speakPulse 1s ease-in-out infinite;
    }
    @keyframes speakPulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.1); } }

    .phrase-example {
      display: flex; align-items: center; gap: 8px;
    }
    .phrase-example > span { flex: 1; }
    .phrase-example-speak {
      width: 24px; height: 24px; border-radius: 6px;
      background: transparent; border: 1px solid var(--border-soft);
      color: var(--text-muted);
      display: inline-flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      transition: all 0.18s ease;
    }
    .phrase-example-speak svg { width: 11px; height: 11px; }
    .phrase-example-speak:hover { background: var(--cat-color, var(--blue)); color: white; border-color: var(--cat-color, var(--blue)); }

    .phrase-got-btn {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 8px 14px; border-radius: 10px;
      background: var(--paper); border: 1px solid var(--border);
      color: var(--text-2);
      font-family: var(--display); font-size: 12px; font-weight: 700;
      transition: all 0.18s ease;
      align-self: flex-start;
    }
    .phrase-got-btn svg { width: 13px; height: 13px; }
    .phrase-got-btn:hover { border-color: var(--green); color: var(--green); }
    .phrase.is-learned .phrase-got-btn {
      background: rgba(21, 128, 61, 0.1); color: var(--green);
      border-color: var(--green);
    }

    /* ── Conversation: play-all + per-line speak ───────────── */
    .convo-header-top {
      display: flex; align-items: flex-start; justify-content: space-between; gap: 18px;
    }
    .convo-play-all {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 10px 16px; border-radius: 999px;
      background: rgba(217, 119, 6, 0.16); color: #fbbf24;
      border: 1px solid rgba(217, 119, 6, 0.32);
      font-family: var(--display); font-size: 12px; font-weight: 800;
      letter-spacing: 0.04em; flex-shrink: 0;
      transition: all 0.18s ease;
    }
    .convo-play-all svg { width: 13px; height: 13px; }
    .convo-play-all:hover { background: #fbbf24; color: var(--blue-deep); }
    .convo-play-all.is-playing { background: #fbbf24; color: var(--blue-deep); }

    .convo-text {
      display: flex; align-items: flex-start; gap: 10px;
    }
    .convo-text > span { flex: 1; min-width: 0; }
    .convo-line-speak {
      width: 28px; height: 28px; border-radius: 7px;
      background: var(--paper-soft); border: 1px solid var(--border-soft);
      color: var(--blue);
      display: inline-flex; align-items: center; justify-content: center;
      flex-shrink: 0; margin-top: 2px;
      transition: all 0.18s ease;
    }
    .convo-line-speak svg { width: 13px; height: 13px; }
    .convo-line-speak:hover { background: var(--blue); color: white; border-color: var(--blue); transform: scale(1.08); }

    /* ── Practice slide (flashcard) ─────────────────────────── */
    .practice-slide {
      display: flex; flex-direction: column; gap: 28px;
    }
    .practice-header {
      background: var(--paper); border: 1px solid var(--border);
      border-radius: 20px;
      padding: 28px 32px;
      border-left: 6px solid var(--gold);
    }
    .practice-eyebrow {
      font-family: var(--display); font-size: 11px; font-weight: 800;
      color: var(--gold); letter-spacing: 0.22em; text-transform: uppercase;
      margin-bottom: 10px;
    }
    .practice-title {
      font-family: var(--display); font-size: 28px; font-weight: 900;
      color: var(--text); letter-spacing: -0.02em; line-height: 1.15;
    }
    .practice-sub {
      font-family: var(--arabic); font-size: 14px; color: var(--text-muted);
      direction: rtl; font-weight: 600; margin-top: 6px;
    }

    .practice-card {
      background: var(--paper);
      border: 2px solid var(--border);
      border-radius: 24px;
      padding: 48px 44px;
      min-height: 360px;
      display: flex; flex-direction: column; gap: 30px;
      position: relative;
      box-shadow: 0 24px 60px -22px rgba(115, 99, 53, 0.20);
    }
    .practice-card-meta {
      display: flex; justify-content: space-between; align-items: center;
      font-family: var(--display); font-size: 12px; font-weight: 700;
      color: var(--text-muted); letter-spacing: 0.06em;
    }
    .practice-pos {
      font-family: var(--mono); color: var(--blue); font-weight: 800;
      padding: 4px 10px; background: var(--paper-deep); border-radius: 999px;
    }
    .practice-cat {
      padding: 4px 10px; background: var(--gold-soft); color: var(--gold);
      border-radius: 999px; font-weight: 700;
    }

    .practice-en {
      flex: 1;
      display: flex; align-items: center; justify-content: center;
      gap: 18px;
      font-family: var(--display); font-size: clamp(24px, 3.5vw, 38px); font-weight: 700;
      line-height: 1.3; letter-spacing: -0.01em; color: var(--text);
      text-align: center;
      padding: 20px 0;
    }
    .practice-speak {
      width: 48px; height: 48px; border-radius: 12px;
      background: var(--blue); color: white; border: none;
      display: inline-flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      transition: all 0.18s ease;
      box-shadow: 0 6px 14px -3px rgba(30, 58, 138, 0.35);
    }
    .practice-speak svg { width: 20px; height: 20px; }
    .practice-speak:hover { background: var(--blue-bright); transform: scale(1.08); }
    .practice-speak.is-speaking { animation: speakPulse 1s ease-in-out infinite; }

    .practice-reveal {
      min-height: 80px;
      display: flex; align-items: center; justify-content: center;
    }
    .practice-reveal-btn {
      padding: 16px 28px; border-radius: 14px;
      background: var(--gold); color: white; border: none;
      font-family: var(--display); font-size: 14px; font-weight: 800;
      letter-spacing: 0.04em;
      transition: all 0.2s ease;
      box-shadow: 0 8px 20px -6px rgba(180, 83, 9, 0.4);
    }
    .practice-reveal-btn:hover { background: var(--gold-bright); transform: translateY(-2px); }
    .practice-ar {
      font-family: var(--arabic); font-size: clamp(22px, 3vw, 32px); color: var(--blue);
      direction: rtl; font-weight: 700; text-align: center; line-height: 1.6;
      animation: revealIn 0.4s cubic-bezier(0.16, 1, 0.3, 1) both;
    }
    @keyframes revealIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

    .practice-actions {
      display: flex; gap: 10px; justify-content: center; flex-wrap: wrap;
    }
    .practice-btn {
      padding: 12px 22px; border-radius: 12px;
      font-family: var(--display); font-size: 13px; font-weight: 700;
      letter-spacing: 0.02em; cursor: pointer;
      transition: all 0.18s ease;
    }
    .practice-btn.is-secondary {

// ── INTERACTIVE HELPERS ──────────────────────────────────
// Premium TTS via inglizi.com/api/tts (OpenAI HD "nova" voice)
// Falls back to Web Speech API on network/CORS failure or when offline.
const TTS_ENDPOINT = (location.hostname.includes('localhost'))
  ? 'https://inglizi.com/api/tts'
  : 'https://inglizi.com/api/tts'

const audioCache = new Map() // text → Blob URL (so repeated phrases are instant)
let currentAudio = null
let preferredEnVoice = null

function loadVoices() {
  if (!window.speechSynthesis) return
  const voices = speechSynthesis.getVoices()
  preferredEnVoice =
    voices.find(v => v.lang === 'en-US' && /Samantha|Allison|Karen|Daniel|Google US English/i.test(v.name)) ||
    voices.find(v => v.lang === 'en-US') ||
    voices.find(v => v.lang?.startsWith('en')) || null
}
if (window.speechSynthesis) {
  loadVoices()
  speechSynthesis.onvoiceschanged = loadVoices
}

function browserSpeak(text, rate = 0.92) {
  if (!window.speechSynthesis) return Promise.resolve()
  return new Promise((resolve) => {
    speechSynthesis.cancel()
    const u = new SpeechSynthesisUtterance(text)
    u.lang = 'en-US'
    if (preferredEnVoice) u.voice = preferredEnVoice
    u.rate = rate
    u.pitch = 1
    u.onend = resolve
    u.onerror = resolve
    speechSynthesis.speak(u)
  })
}

async function fetchTtsUrl(text) {
  if (audioCache.has(text)) return audioCache.get(text)
  const res = await fetch(TTS_ENDPOINT, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ text }),
  })
  if (!res.ok) throw new Error('TTS request failed: ' + res.status)
  const blob = await res.blob()
  const url = URL.createObjectURL(blob)
  audioCache.set(text, url)
  // Cap cache size to ~80 phrases (each ~30 KB) to avoid memory bloat
  if (audioCache.size > 80) {
    const first = audioCache.keys().next().value
    URL.revokeObjectURL(audioCache.get(first))
    audioCache.delete(first)
  }
  return url
}

async function speak(text, rate = 0.92) {
  stopSpeak()
  try {
    const url = await fetchTtsUrl(text)
    return new Promise((resolve) => {
      const a = new Audio(url)
      a.playbackRate = rate / 0.92 // baseline already 0.92 from server
      currentAudio = a
      a.onended = resolve
      a.onerror = () => { browserSpeak(text, rate).then(resolve) }
      a.play().catch(() => browserSpeak(text, rate).then(resolve))
    })
  } catch {
    return browserSpeak(text, rate)
  }
}

function stopSpeak() {
  try { speechSynthesis.cancel() } catch {}
  if (currentAudio) {
    try { currentAudio.pause(); currentAudio.currentTime = 0 } catch {}
    currentAudio = null
  }
}

// Sequential playback (for "Play all" buttons)
let playSequenceAbort = false
async function playSequence(texts, rate = 0.92, pauseMs = 600) {
  playSequenceAbort = false
  for (const t of texts) {
    if (playSequenceAbort) break
    await speak(t, rate)
    if (playSequenceAbort) break
    await new Promise(r => setTimeout(r, pauseMs))
  }
}

// Progress tracking via localStorage
const PROGRESS_KEY = 'sahla.business.progress.v1'
function readProgress() {
  try { return JSON.parse(localStorage.getItem(PROGRESS_KEY) || '{}') } catch { return {} }
}
function writeProgress(p) {
  try { localStorage.setItem(PROGRESS_KEY, JSON.stringify(p)) } catch {}
}
function phraseKey(unitId, catIdx, itemIdx) { return `${unitId}.${catIdx}.${itemIdx}` }
function isLearned(unitId, catIdx, itemIdx) {
  return !!readProgress()[phraseKey(unitId, catIdx, itemIdx)]
}
function toggleLearned(unitId, catIdx, itemIdx) {
  const p = readProgress()
  const k = phraseKey(unitId, catIdx, itemIdx)
  if (p[k]) delete p[k]; else p[k] = Date.now()
  writeProgress(p)
  return !!p[k]
}
function unitLearnedCount(unitId) {
  const p = readProgress()
  const prefix = unitId + '.'
  return Object.keys(p).filter(k => k.startsWith(prefix)).length
}
function unitTotalCount(unitId) {
  const u = UNITS.find(x => x.id === unitId)
  if (!u) return 0
  return u.categories.reduce((c, cat) => c + cat.items.length, 0)
}
function categoryLearnedCount(unitId, catIdx) {
  const p = readProgress()
  const prefix = unitId + '.' + catIdx + '.'
  return Object.keys(p).filter(k => k.startsWith(prefix)).length
}

// ── UNIT (slide mode) ─────────────────────────────────────
let currentUnit = null
let currentSlide = 0
let slides = []

function buildSlides(u) {
  const out = [{ type: 'cover' }]
  u.categories.forEach((_, i) => out.push({ type: 'category', catIdx: i }))
  if (u.conversation) out.push({ type: 'conversation' })
  out.push({ type: 'practice' })
  if (u.quiz) out.push({ type: 'quiz' })
  if (u.review) out.push({ type: 'review' })
  return out
}

function renderUnit(id, slideIdx = 0) {
  const u = UNITS.find((x) => x.id === id)
  if (!u) { renderHub(); return }
  currentUnit = u
  slides = buildSlides(u)
  currentSlide = Math.max(0, Math.min(slideIdx, slides.length - 1))
  practiceIdx = 0
  practiceRevealed = false
  paintUnit()
}

function paintUnit() {
  stopSpeak()
  playSequenceAbort = true
  const u = currentUnit
  if (!u) return
  const slide = slides[currentSlide]
  const totalPhrases = u.categories.reduce((c, cat) => c + cat.items.length, 0)

  let slideHtml = ''
  if (slide.type === 'cover') {
    slideHtml = renderCover(u, totalPhrases)
  } else if (slide.type === 'category') {
    slideHtml = renderCategory(u, slide.catIdx)
  } else if (slide.type === 'conversation') {
    slideHtml = renderConversation(u)
  } else if (slide.type === 'practice') {
    slideHtml = renderPractice(u)
  } else if (slide.type === 'quiz') {
    slideHtml = renderQuiz(u)
  } else if (slide.type === 'review') {
    slideHtml = renderReview(u)
  }

  const next = UNITS[UNITS.findIndex(x => x.id === u.id) + 1]

  app.innerHTML = `
    <div class="view unit-view">
      <div class="slide-controls">
        <a href="#" class="slide-back">← All Units</a>
        <div class="slide-dots">
          ${slides.map((_, i) => `
            <button class="slide-dot ${i < currentSlide ? 'is-done' : ''} ${i === currentSlide ? 'is-current' : ''}" data-go="${i}"></button>
          `).join('')}
        </div>
        <span class="slide-meta"><b>${currentSlide + 1}</b> / ${slides.length}</span>
        <button class="fullscreen-btn" id="fs-btn" title="Toggle distraction-free mode (F)">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M3 8V5a2 2 0 0 1 2-2h3"/><path d="M21 8V5a2 2 0 0 0-2-2h-3"/><path d="M3 16v3a2 2 0 0 0 2 2h3"/><path d="M21 16v3a2 2 0 0 1-2 2h-3"/></svg>
        </button>
      </div>

      <div class="slide">${slideHtml}</div>
    </div>

    <div class="slide-nav-hint">
      <button class="slide-nav-arrow" id="hint-prev" ${currentSlide === 0 ? 'disabled' : ''}>←</button>
      <span class="slide-nav-hint-kb"><kbd>Space</kbd> next · <kbd>F</kbd> full</span>
      <button class="slide-nav-arrow" id="hint-next" ${currentSlide === slides.length - 1 ? 'disabled' : ''}>→</button>
    </div>
  `

  document.title = `${u.titleEn} — Business English · Sahla`

  // Bindings
  document.querySelectorAll('.slide-dot').forEach((dot) => {
    dot.addEventListener('click', () => { currentSlide = Number(dot.dataset.go); paintUnit() })
  })
  document.getElementById('hint-prev')?.addEventListener('click', goPrev)
  document.getElementById('hint-next')?.addEventListener('click', goNext)
  document.getElementById('fs-btn')?.addEventListener('click', toggleFullscreen)

  // Quiz bindings
  document.querySelectorAll('.quiz-item').forEach((item) => {
    const reveal = () => {
      item.classList.add('is-revealed')
      item.querySelectorAll('.quiz-choice').forEach(btn => {
        if (btn.dataset.correct === '1') btn.classList.add('is-correct')
      })
    }
    item.querySelectorAll('.quiz-choice').forEach(btn => btn.addEventListener('click', reveal))
    const r = item.querySelector('.quiz-reveal-btn')
    if (r) r.addEventListener('click', reveal)
  })

  // Speak buttons (works for phrases, examples, conversation lines, practice card)
  document.querySelectorAll('[data-speak]').forEach((btn) => {
    btn.addEventListener('click', (e) => {
      e.stopPropagation()
      const text = btn.dataset.speak
      btn.classList.add('is-speaking')
      speak(text).then(() => btn.classList.remove('is-speaking'))
    })
  })

  // "Got it" toggle buttons
  document.querySelectorAll('[data-got]').forEach((btn) => {
    btn.addEventListener('click', () => {
      const [ci, ii] = btn.dataset.got.split('-').map(Number)
      const learned = toggleLearned(currentUnit.id, ci, ii)
      const card = btn.closest('.phrase')
      card.classList.toggle('is-learned', learned)
      btn.querySelector('span').textContent = learned ? 'Got it ✓' : 'Mark as got it'
      // Update progress bar
      const bar = document.querySelector(`[data-cat-progress="${ci}"]`)
      if (bar) {
        const cat = currentUnit.categories[ci]
        const count = categoryLearnedCount(currentUnit.id, ci)
        const fill = bar.querySelector('.cat-progress-fill')
        const text = bar.querySelector('.cat-progress-text')
        if (fill) fill.style.width = ((count / cat.items.length) * 100) + '%'
        if (text) text.innerHTML = `<b>${count}</b>/${cat.items.length} learned · <span dir="rtl">تعلمت</span>`
      }
    })
  })

  // Category "Play all" button
  const catPlayBtn = document.querySelector('[data-cat-play]')
  if (catPlayBtn) {
    let playing = false
    catPlayBtn.addEventListener('click', async () => {
      const ci = Number(catPlayBtn.dataset.catPlay)
      if (playing) { playSequenceAbort = true; stopSpeak(); playing = false; catPlayBtn.innerHTML = ICON_PLAY + '<span>Play all</span>'; return }
      playing = true
      catPlayBtn.innerHTML = ICON_STOP + '<span>Stop</span>'
      catPlayBtn.classList.add('is-playing')
      const items = currentUnit.categories[ci].items.map(it => it.en)
      await playSequence(items, 0.95, 700)
      playing = false
      catPlayBtn.innerHTML = ICON_PLAY + '<span>Play all</span>'
      catPlayBtn.classList.remove('is-playing')
    })
  }

  // Conversation "Play full dialog"
  const convoPlayAll = document.getElementById('convo-play-all')
  if (convoPlayAll) {
    let playing = false
    convoPlayAll.addEventListener('click', async () => {
      if (playing) { playSequenceAbort = true; stopSpeak(); playing = false; convoPlayAll.innerHTML = ICON_PLAY + '<span>Play full dialog</span>'; return }
      playing = true
      convoPlayAll.innerHTML = ICON_STOP + '<span>Stop</span>'
      convoPlayAll.classList.add('is-playing')
      const lines = currentUnit.conversation.lines
        .filter(([sp, t]) => t && t !== '—' && sp !== '' && sp !== 'Subject' && sp !== 'Body')
        .map(([sp, t]) => t)
      await playSequence(lines, 0.95, 800)
      playing = false
      convoPlayAll.innerHTML = ICON_PLAY + '<span>Play full dialog</span>'
      convoPlayAll.classList.remove('is-playing')
    })
  }

  // Practice slide bindings
  const practiceReveal = document.getElementById('practice-reveal')
  if (practiceReveal) practiceReveal.addEventListener('click', () => {
    practiceRevealed = true
    paintUnit()
    // Auto-speak after reveal
    setTimeout(() => {
      const phrases = allPhrases(currentUnit)
      speak(phrases[practiceIdx % phrases.length].en)
    }, 250)
  })
  const practiceNext = document.getElementById('practice-next')
  if (practiceNext) practiceNext.addEventListener('click', () => {
    practiceIdx = (practiceIdx + 1) % allPhrases(currentUnit).length
    practiceRevealed = false
    paintUnit()
  })
  const practiceSkip = document.getElementById('practice-skip')
  if (practiceSkip) practiceSkip.addEventListener('click', () => {
    const total = allPhrases(currentUnit).length
    practiceIdx = (practiceIdx - 1 + total) % total
    practiceRevealed = false
    paintUnit()
  })
  const practiceShuffle = document.getElementById('practice-shuffle')
  if (practiceShuffle) practiceShuffle.addEventListener('click', () => {
    const total = allPhrases(currentUnit).length
    practiceIdx = Math.floor(Math.random() * total)
    practiceRevealed = false
    paintUnit()
  })

  // Stop any speech when leaving slide
  // (handled by paintUnit's stopSpeak() at top — added below)

  window.scrollTo({ top: 0, behavior: 'instant' })
}

// ── Navigation ───────────────────────────────────────────
function goNext() {
  if (!currentUnit) return
  if (currentSlide < slides.length - 1) {
    currentSlide++
    paintUnit()
  }
}
function goPrev() {
  if (!currentUnit) return
  if (currentSlide > 0) {
    currentSlide--
    paintUnit()
  }
}

// Keyboard
window.addEventListener('keydown', (e) => {
  if (!currentUnit) return
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return

  if (e.key === ' ' || e.key === 'ArrowRight' || e.key === 'PageDown') {
    e.preventDefault(); goNext()
  } else if (e.key === 'ArrowLeft' || e.key === 'PageUp') {
    e.preventDefault(); goPrev()
  } else if (e.key === 'f' || e.key === 'F') {
    toggleFullscreen()
  } else if (e.key === 'Escape') {
    document.body.classList.remove('is-fullscreen')
  }
})

// Touch / swipe
let touchStartX = null
let touchStartY = null
window.addEventListener('touchstart', (e) => {
  touchStartX = e.touches[0].clientX
  touchStartY = e.touches[0].clientY
}, { passive: true })
window.addEventListener('touchend', (e) => {
  if (touchStartX === null) return
  const dx = touchStartX - e.changedTouches[0].clientX
  const dy = Math.abs(touchStartY - e.changedTouches[0].clientY)
  // Horizontal swipe with significant distance and minimal vertical drift
  if (Math.abs(dx) > 60 && dy < 60 && currentUnit) {
    if (dx > 0) goNext()
    else goPrev()
  }
  touchStartX = null
  touchStartY = null
}, { passive: true })

// Cover "Begin" button (delegated since rendered dynamically)
document.addEventListener('click', (e) => {
  if (e.target.id === 'cover-start') goNext()
})

// Fullscreen
function toggleFullscreen() {
  document.body.classList.toggle('is-fullscreen')
}

// Router
function route() {
  const m = location.hash.match(/^#u(\d+)$/)
  if (m) {
    renderUnit(Number(m[1]))
  } else {
    currentUnit = null
    renderHub()
  }
}
window.addEventListener('hashchange', route)
route()
</script>
</body>
</html>
